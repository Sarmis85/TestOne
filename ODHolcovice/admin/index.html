function buildSidebar(role) {
  const cfg = ROLES[role];
  const nav = document.getElementById('sidebar-nav');
  document.getElementById('sidebar-avatar').textContent = cfg.avatar;
  document.getElementById('sidebar-name').textContent = cfg.label;
  document.getElementById('sidebar-role').textContent = cfg.roleText;
  document.getElementById('sidebar-role-label').textContent = cfg.roleText;

  let html = `<div class="admin-sidebar__section-title">Přehled</div>
    <a href="index.html" class="admin-nav-item active">${ICONS.home}<span class="admin-nav-item__label">Dashboard</span></a>`;

  cfg.nav.forEach(sectionKey => {
    const sec = NAV_SECTIONS[sectionKey];
    if (!sec) return;
    html += `<div class="admin-sidebar__section-title">${sec.title}</div>`;
    sec.items.forEach(item => {
      const badge = item.badge ? `<span class="admin-nav-item__badge">${item.badge}</span>` : '';
      const target = item.target ? `target="${item.target}"` : '';
      html += `<a href="${item.href}" class="admin-nav-item" ${target}>${ICONS[item.icon]}<span class="admin-nav-item__label">${item.label}</span>${badge}</a>`;
    });
  });

  nav.innerHTML = html;
}

/* ═══ APPLY ROLE ════════════════════════════════════════════════ */
function applyRole(role) {
  buildSidebar(role);
  const content = document.getElementById('dashboard-content');
  const fn = DASHBOARDS[role];
  content.innerHTML = fn ? fn() : '<p>Dashboard pro tuto roli není k dispozici.</p>';
  // Re-init admin scripts
  DataTable.init();
  Modal.init();
  initFilters();
}

// Init with super admin
document.addEventListener('DOMContentLoaded', () => {
  applyRole('super');
  AdminSidebar.init();
});

<script>
// ── Dashboard KPI z API ───────────────────────────────────────
(async function loadStats() {
  try {
    const res  = await fetch('../api/admin/stats.php');
    if (!res.ok) return;
    const s = await res.json();

    // KPI čísla — najdeme elementy podle pořadí nebo data atributů
    const kpis = document.querySelectorAll('.admin-kpi__value');
    if (kpis[0]) kpis[0].textContent = s.today.orders;
    if (kpis[1]) kpis[1].textContent = Math.round(s.today.revenue).toLocaleString('cs') + ' Kč';
    if (kpis[2]) kpis[2].textContent = s.pending_reservations;
    if (kpis[3]) kpis[3].textContent = s.rating.avg ? s.rating.avg + ' ★' : '—';

    // Odznaky v sidebaru
    document.querySelectorAll('.admin-nav-item').forEach(a => {
      const badge = a.querySelector('.admin-nav-item__badge');
      if (!badge) return;
      const href = a.getAttribute('href') ?? '';
      if (href.includes('reservations')) badge.textContent = s.pending_reservations;
      if (href.includes('orders'))       badge.textContent = s.pending_orders;
    });

    // Top jídla — vypíšeme pod tabulku jídel pokud existuje
    if (s.top_foods?.length) {
      const existing = document.getElementById('top-foods-widget');
      if (existing) {
        existing.innerHTML = s.top_foods.map(f =>
          `<div style="display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--c-border-light);font-size:.875rem">
            <span>${f.name}</span>
            <span style="color:var(--c-gold);font-weight:600">${f.rating_avg} ★ <span style="color:var(--c-text-muted);font-weight:400">(${f.rating_count})</span></span>
          </div>`
        ).join('');
      }
    }
  } catch(e) {
    console.warn('Stats API nedostupné');
  }
})();
</script>
