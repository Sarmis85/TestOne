<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení – Obecní dům Holčovice</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body style="background:var(--c-cream-100)">

<nav class="nav nav--scrolled" style="position:fixed" id="main-nav">
  <div class="container nav__inner">
    <a href="../index.html" class="nav__logo"><div class="nav__logo-mark"><span>OD</span></div><div class="nav__logo-text"><span class="nav__logo-name">Obecní dům</span><span class="nav__logo-sub">Holčovice</span></div></a>
    <div style="flex:1"></div>
    <a href="../contact.html#reservation" class="btn btn--accent btn--sm">Rezervovat stůl</a>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo__mark"><span>OD</span></div>
      <h1 class="auth-title">Přihlásit se</h1>
      <p class="auth-subtitle">Přihlaste se ke svému účtu pro objednávání rozvozu a správu rezervací.</p>
    </div>

    <form class="auth-form" data-validate onsubmit="event.preventDefault();window.location.href='profile.html'">
      <div class="form-group">
        <label class="form-label form-label--req" for="email">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="jan@example.cz" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label form-label--req" for="password">Heslo</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-input" placeholder="Vaše heslo" required autocomplete="current-password" style="padding-right:3rem">
          <button type="button" onclick="togglePassword()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);color:var(--c-text-muted);line-height:1" aria-label="Zobrazit heslo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <label class="form-check"><input type="checkbox"><span style="font-size:0.875rem;color:var(--c-text-sec)">Zapamatovat si mě</span></label>
        <a href="#" style="font-size:0.875rem;color:var(--c-green-700);font-weight:600">Zapomněli jste heslo?</a>
      </div>
      <button type="submit" class="btn btn--primary btn--lg btn--full">Přihlásit se</button>
    </form>

    <div class="auth-footer">
      Nemáte účet? <a href="register.html">Zaregistrovat se</a>
    </div>

    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--c-border-light);text-align:center">
      <p style="font-size:0.8125rem;color:var(--c-text-muted);margin-bottom:0.75rem">Přihlásit se jako zaměstnanec</p>
      <a href="../admin/index.html" class="btn btn--ghost btn--sm btn--full" style="border:1px solid var(--c-border)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Admin přihlášení
      </a>
    </div>
  </div>
</main>

<div class="toast-container"></div>
<script src="../js/main.js"></script>
<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
