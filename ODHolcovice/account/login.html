<!DOCTYPE html>
<html lang="cs">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení – Obecní dům Holčovice</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body style="background:var(--c-cream-100)">

<nav class="nav nav--scrolled" style="position:fixed" id="main-nav">
  <div class="container nav__inner">
    <a href="../index.html" class="nav__logo"><img src="../img/OD1_Logo_Small_průhledné.png" class="nav__logo-img" alt="Obecní dům Holčovice"></a>
    <div style="flex:1"></div>
    <a href="../contact.html#reservation" class="btn btn--accent btn--sm">Rezervovat stůl</a>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="../img/OD_Logo_průhledné.png" class="auth-logo-img" alt="Obecní dům Holčovice">
      <h1 class="auth-title">Přihlásit se</h1>
      <p class="auth-subtitle">Přihlaste se ke svému účtu pro objednávání rozvozu a správu rezervací.</p>
    </div>

    <form class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label form-label--req" for="login">E-mail</label>
        <input type="text" id="login" name="login" class="form-input"
               placeholder="jan@example.cz"
               required autocomplete="email"
               minlength="2">
      </div>
      <div class="form-group">
        <label class="form-label form-label--req" for="password">Heslo</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-input" placeholder="Vaše heslo" required autocomplete="current-password" style="padding-right:3rem">
          <button type="button" onclick="togglePassword()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);color:var(--c-text-muted);line-height:1" aria-label="Zobrazit heslo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <label class="form-check"><input type="checkbox"><span style="font-size:0.875rem;color:var(--c-text-sec)">Zapamatovat si mě</span></label>
        <a href="#" style="font-size:0.875rem;color:var(--c-green-700);font-weight:600">Zapomněli jste heslo?</a>
      </div>
      <button type="submit" class="btn btn--primary btn--lg btn--full">Přihlásit se</button>
    </form>

    <div class="auth-footer">
      Nemáte účet? <a href="register.html">Zaregistrovat se</a>
    </div>

    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--c-border-light);text-align:center">
      <p style="font-size:0.8125rem;color:var(--c-text-muted);margin-bottom:0.75rem">Přihlásit se jako zaměstnanec</p>
      <a href="../admin/index.html" class="btn btn--ghost btn--sm btn--full" style="border:1px solid var(--c-border)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Admin přihlášení
      </a>
    </div>
  </div>
</main>

<div class="toast-container"></div>
<script src="../js/main.js"></script>
<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function handleLogin(e) {
  e.preventDefault();
  const loginVal = document.getElementById('login').value.trim();
  const passVal  = document.getElementById('password').value;
  const btn      = e.target.querySelector('[type=submit]');

  if (!loginVal || !passVal) {
    Toast.show({ title: 'Vyplňte e-mail a heslo', type: 'warning' });
    return;
  }

  // Pokud vstup obsahuje @ nebo vypadá jako pokus o email (má tečku bez mezery),
  // vynutíme platný emailový formát — pro zákazníky.
  // Čistý alfanumerický řetězec bez @ projde tiše (interní přihlášení).
  const looksLikeEmail = loginVal.includes('@') || /^[^\s]+\.[^\s]+$/.test(loginVal);
  if (looksLikeEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginVal)) {
    Toast.show({ title: 'Zadejte platnou e-mailovou adresu', type: 'warning' });
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Přihlašuji…';

  try {
    const res  = await fetch('../api/auth/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login: loginVal, password: passVal }),
    });
    const data = await res.json();

    if (!res.ok) {
      Toast.show({ title: data.error ?? 'Chyba přihlášení', type: 'error' });
      btn.disabled = false;
      btn.textContent = 'Přihlásit se';
      return;
    }

    // Uložit základní info do sessionStorage pro frontend
    sessionStorage.setItem('od_user', JSON.stringify({
      id: data.user_id, username: data.username,
      first_name: data.first_name, roles: data.roles,
    }));

    Toast.show({ title: `Vítejte, ${data.first_name}!`, type: 'success' });
    setTimeout(() => { window.location.href = data.redirect; }, 700);

  } catch (err) {
    // API ještě není live — demo přesměrování podle zadaného jména
    const staffLogins = ['admin','vedouci','obsluha1','obsluha2','kuchyn1','kuchyn2','rozvoz1','sprava.obce'];
    const isStaff = staffLogins.includes(loginVal.toLowerCase());
    Toast.show({ title: `Demo: přihlášen jako ${loginVal}`, type: 'success' });
    setTimeout(() => {
      window.location.href = isStaff ? '../admin/index.html' : 'profile.html';
    }, 700);
  }
}
</script>
</body>
</html>
