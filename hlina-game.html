<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hlína do Vlečky</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto}
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:clamp(6px,2vw,14px) clamp(10px,3vw,20px);
  pointer-events:none;
  font-family:'Segoe UI',Arial,sans-serif;
  color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
#hud-left{display:flex;flex-direction:column;gap:6px}
#timer-box{
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:4px 12px;
  font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:.05em;
  min-width:100px;text-align:center;
}
#progress-label{font-size:clamp(.65rem,2vw,.85rem);opacity:.8;margin-bottom:2px}
#progress-track{
  width:clamp(120px,28vw,200px);height:16px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;
}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#d4923a,#e8b84a);border-radius:8px;transition:width .25s}
#smoke-indicator{
  font-size:clamp(.8rem,2.5vw,1.1rem);
  background:rgba(0,0,0,.6);border:1px solid rgba(255,200,0,.4);
  border-radius:8px;padding:3px 10px;
  display:none;
}
#joystick-wrap{
  position:absolute;bottom:clamp(20px,5vw,40px);left:clamp(20px,5vw,40px);
  display:none;pointer-events:auto;
}
#joystick-base{
  width:clamp(80px,18vw,110px);height:clamp(80px,18vw,110px);
  border-radius:50%;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);
  position:relative;touch-action:none;
}
#joystick-knob{
  position:absolute;width:38%;height:38%;
  background:radial-gradient(circle at 35% 35%,#ffe066,#c8a000);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
/* Overlays */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);
  font-family:'Segoe UI',Arial,sans-serif;color:#fff;
  gap:14px;padding:24px;text-align:center;
  backdrop-filter:blur(4px);
}
.overlay h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:800;letter-spacing:.04em;color:#ffe066;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.overlay p{font-size:clamp(.85rem,2.5vw,1.1rem);opacity:.9;max-width:440px;line-height:1.6}
.btn{
  margin-top:8px;padding:12px 36px;
  background:linear-gradient(135deg,#d4923a,#b87020);
  border:none;border-radius:8px;color:#fff;
  font-size:clamp(1rem,3vw,1.2rem);font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .1s,box-shadow .1s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.btn:active{transform:translateY(0)}
#flash-overlay{
  position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  transition:opacity .05s;
}
#toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(40,40,40,.92);color:#ffe066;
  border:1px solid rgba(255,200,0,.4);border-radius:8px;
  padding:8px 20px;font-family:'Segoe UI',Arial,sans-serif;
  font-size:clamp(.85rem,2.5vw,1rem);font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="hud-left">
      <div id="timer-box">0:00.0</div>
      <div>
        <div id="progress-label">Vlečka: 0 / 10</div>
        <div id="progress-track"><div id="progress-bar"></div></div>
      </div>
    </div>
    <div id="smoke-indicator">🚬 Přestávka…</div>
  </div>
  <div id="joystick-wrap"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  <div id="flash-overlay"></div>
  <div id="toast"></div>

  <!-- START -->
  <div class="overlay" id="ov-start">
    <h1>⛏ Hlína do Vlečky</h1>
    <p>Naplň vlečku 10× lopatou hlíny. Pohyb: <b>WASD / šipky</b> nebo joystick.<br>Dávej pozor na fotografa! A na cigaretové přestávky…</p>
    <button class="btn" id="btn-start">Hrát!</button>
  </div>
  <!-- WIN -->
  <div class="overlay" id="ov-win" style="display:none">
    <h1>🏆 Výhra!</h1>
    <p id="win-msg">Vlečka plná! Čas: <b id="win-time">—</b></p>
    <button class="btn" id="btn-win">Znovu</button>
  </div>
  <!-- LOSE -->
  <div class="overlay" id="ov-lose" style="display:none">
    <h1>📷 Chycen!</h1>
    <p>Fotograf tě přistihl s lopatou hlíny!<br>Čas: <b id="lose-time">—</b></p>
    <button class="btn" id="btn-lose">Zkusit znovu</button>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const W = 720, H = 500;

// Photo: 1848×850 → drawn at (0,0,1087,500), scale = 500/850 ≈ 0.588
// Game ground: road/grass at canvas y ≈ 348–480 (photo y ≈ 592–816)
// Dirt zone: left grass in front of building (photo x 50–250, y 620–790)
// Truck zone: road right of building (photo x 850–1100, y 600–775)
const DIRT_ZONE  = {x:28,  y:368, w:120, h:90};
const TRUCK_ZONE = {x:502, y:352, w:150, h:98};

// Background photo (1848×850)
const bgImg = new Image();
bgImg.src = 'media/bg.png';

// Player config
const PLAYER_SPEED = 2.8;
const PLAYER_W = 32, PLAYER_H = 52;

// Obstacle timings (seconds)
const PHOTO_FIRST_MIN = 20, PHOTO_FIRST_MAX = 35;
const PHOTO_GAP_MIN   = 25, PHOTO_GAP_MAX   = 45;
const PHOTO_VIS_MIN   = 6,  PHOTO_VIS_MAX   = 10;
const PHOTO_DETECT_DIST = 200;

const SMOKE_GAP_MIN = 12, SMOKE_GAP_MAX = 18;
const SMOKE_DUR = 3;

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let SCALE=1, OX=0, OY=0, DPR=1;

function resize(){
  DPR   = window.devicePixelRatio || 1;
  const vw = window.innerWidth, vh = window.innerHeight;
  SCALE = Math.min(vw/W, vh/H);
  OX    = (vw - W*SCALE)/2;
  OY    = (vh - H*SCALE)/2;
  canvas.width  = vw*DPR;
  canvas.height = vh*DPR;
  canvas.style.width  = vw+'px';
  canvas.style.height = vh+'px';
}
window.addEventListener('resize', resize);
resize();

function logicalToCanvas(lx,ly){
  return [(OX+lx*SCALE)*DPR, (OY+ly*SCALE)*DPR];
}

// ── State ────────────────────────────────────────────────────────────────────
let state='start'; // start|play|win|lose
let keys={};
let joy={dx:0,dy:0};

let player, load, carrying;
let elapsedMs, timerInterval;
let photoTimer, photoVisible, photoX, photoY, photoVisTimer;
let smokeTimer, smokePause, smokePauseTimer;
let animFrame=0, animTick=0;
let puff=[];  // smoke puffs [{x,y,r,a,vx,vy}]
let flashTimer=0;

function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}

function initGame(){
  player = {x:230, y:415, vx:0, vy:0, facing:1};
  load=0; carrying=false;
  elapsedMs=0;
  animFrame=0; animTick=0;
  puff=[];
  flashTimer=0;
  photoVisible=false;
  photoTimer = rand(PHOTO_FIRST_MIN, PHOTO_FIRST_MAX);
  smokeTimer = rand(SMOKE_GAP_MIN, SMOKE_GAP_MAX);
  smokePause=false; smokePauseTimer=0;

  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-label').textContent='Vlečka: 0 / 10';
  document.getElementById('timer-box').textContent='0:00.0';
  document.getElementById('smoke-indicator').style.display='none';

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(state==='play' && !smokePause){
      elapsedMs+=100;
      updateTimerDisplay();
    }
  },100);
}

function updateTimerDisplay(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  document.getElementById('timer-box').textContent=
    m+':'+(ss<10?'0':'')+ss+'.'+ds;
}
function fmtTime(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  return m+':'+(ss<10?'0':'')+ss+'.'+ds;
}

// ── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',  e=>{keys[e.key]=false});

// Touch joystick
const jBase = document.getElementById('joystick-base');
const jKnob = document.getElementById('joystick-knob');
let jTouch=null, jCx=0, jCy=0, jR=0;

function setupJoystick(){
  const isTouch = 'ontouchstart' in window;
  if(isTouch) document.getElementById('joystick-wrap').style.display='block';
  jBase.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const r=jBase.getBoundingClientRect();
    jCx=r.left+r.width/2; jCy=r.top+r.height/2; jR=r.width/2;
    jTouch=t.identifier;
    updateJoy(t.clientX, t.clientY);
  },{passive:false});
  jBase.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.touches) if(t.identifier===jTouch) updateJoy(t.clientX,t.clientY);
  },{passive:false});
  jBase.addEventListener('touchend',e=>{
    jTouch=null; joy={dx:0,dy:0};
    jKnob.style.transform='translate(-50%,-50%)';
  },{passive:false});
}
function updateJoy(cx,cy){
  let dx=cx-jCx, dy=cy-jCy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const max=jR*0.38;
  if(dist>max){dx*=max/dist;dy*=max/dist;}
  joy.dx=dx/max; joy.dy=dy/max;
  jKnob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}
setupJoystick();

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.style.opacity='0',2200);
}

// ── Game Logic Update ─────────────────────────────────────────────────────────
function update(dt){
  if(state!=='play') return;

  // Flash
  if(flashTimer>0){
    flashTimer-=dt;
    const fl=document.getElementById('flash-overlay');
    fl.style.opacity=Math.max(0,flashTimer/0.3);
    if(flashTimer<=0) fl.style.opacity=0;
  }

  // Smoke puffs update
  puff=puff.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.r+=8*dt; p.a-=0.6*dt;
    return p.a>0;
  });

  // Smoke pause
  if(smokePause){
    smokePauseTimer-=dt;
    if(smokePauseTimer<=0){
      smokePause=false;
      document.getElementById('smoke-indicator').style.display='none';
    }
    // emit puffs during pause
    if(Math.random()<0.15){
      puff.push({
        x:player.x+(player.facing>0?14:-14),
        y:player.y-30,
        r:4, a:0.7,
        vx:rand(-10,10), vy:rand(-25,-10)
      });
    }
    return; // player frozen
  }

  // Smoke timer
  smokeTimer-=dt;
  if(smokeTimer<=0){
    smokePause=true;
    smokePauseTimer=SMOKE_DUR;
    smokeTimer=rand(SMOKE_GAP_MIN,SMOKE_GAP_MAX);
    document.getElementById('smoke-indicator').style.display='block';
    showToast('🚬 Cigaretová přestávka!');
  }

  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy=1;
  dx+=joy.dx; dy+=joy.dy;
  if(dx!==0||dy!==0){
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len; dy/=len;
    player.x+=dx*PLAYER_SPEED;
    player.y+=dy*PLAYER_SPEED;
    if(dx!==0) player.facing=dx>0?1:-1;
  }
  // Clamp to playable ground (below hedge line, above bottom edge)
  player.x=Math.max(20,Math.min(W-20,player.x));
  player.y=Math.max(348,Math.min(H-28,player.y));

  // Animation
  animTick+=dt;
  if(animTick>0.1){ animTick=0; animFrame++; }

  // Zone interactions
  const px=player.x, py=player.y;
  const inDirt = px>DIRT_ZONE.x && px<DIRT_ZONE.x+DIRT_ZONE.w &&
                 py>DIRT_ZONE.y && py<DIRT_ZONE.y+DIRT_ZONE.h;
  const inTruck= px>TRUCK_ZONE.x && px<TRUCK_ZONE.x+TRUCK_ZONE.w &&
                 py>TRUCK_ZONE.y && py<TRUCK_ZONE.y+TRUCK_ZONE.h;

  if(inDirt && !carrying) carrying=true;
  if(inTruck && carrying){
    carrying=false; load++;
    document.getElementById('progress-bar').style.width=(load/10*100)+'%';
    document.getElementById('progress-label').textContent='Vlečka: '+load+' / 10';
    if(load>=10){ endGame('win'); return; }
  }

  // Photographer
  photoTimer-=dt;
  if(photoTimer<=0 && !photoVisible){
    photoVisible=true;
    photoVisTimer=rand(PHOTO_VIS_MIN,PHOTO_VIS_MAX);
    // spawn off-screen edge
    const side=Math.random()<0.5?0:1;
    photoX=side===0?-40:W+40;
    photoY=rand(355,H-60);
  }
  if(photoVisible){
    photoVisTimer-=dt;
    // move toward player
    const pdx=player.x-photoX, pdy=player.y-photoY;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    const spd=55;
    if(pd>1){photoX+=pdx/pd*spd*dt; photoY+=pdy/pd*spd*dt;}

    // detect
    if(carrying && pd<PHOTO_DETECT_DIST){
      endGame('lose'); return;
    }
    if(photoVisTimer<=0){
      photoVisible=false;
      photoTimer=rand(PHOTO_GAP_MIN,PHOTO_GAP_MAX);
    }
  }
}

function endGame(result){
  state=result;
  clearInterval(timerInterval);
  if(result==='win'){
    document.getElementById('win-time').textContent=fmtTime();
    document.getElementById('ov-win').style.display='flex';
  } else {
    flashTimer=0.6;
    document.getElementById('flash-overlay').style.opacity='1';
    document.getElementById('lose-time').textContent=fmtTime();
    setTimeout(()=>{
      document.getElementById('ov-lose').style.display='flex';
    },700);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function render(){
  ctx.save();
  ctx.setTransform(SCALE*DPR,0,0,SCALE*DPR,OX*DPR,OY*DPR);
  ctx.clearRect(0,0,W,H);

  drawBackground();
  drawDirtHeap();
  drawTrailer();
  drawZoneIndicators();
  drawSmokeParticles();

  if(photoVisible) drawPhotographer();
  drawPlayer();

  if(photoVisible && carrying){
    drawDetectionLine();
  }

  ctx.restore();
}

// ── Background — real photo ───────────────────────────────────────────────────
function drawBackground(){
  // Scale photo to canvas height (500px), left-anchored
  // Photo 1848×850 → display 1087×500; shows left 66% of photo
  if(bgImg.complete && bgImg.naturalWidth>0){
    const dw = Math.round(1848 * H / 850);
    ctx.drawImage(bgImg, 0, 0, dw, H);
  } else {
    // Fallback while loading
    ctx.fillStyle='#8aa870'; ctx.fillRect(0,0,W,H);
  }
}

// ── Dirt heap — overlaid on photo grass ──────────────────────────────────────
function drawDirtHeap(){
  const cx = DIRT_ZONE.x + DIRT_ZONE.w*0.44;
  const cy = DIRT_ZONE.y + DIRT_ZONE.h*0.38;
  // Shadow under mound
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(cx+4,cy+28,54,14,0,0,Math.PI*2); ctx.fill();
  // Main mound
  const mnd=ctx.createRadialGradient(cx,cy,4,cx,cy+12,58);
  mnd.addColorStop(0,'rgba(115,62,18,0.95)');
  mnd.addColorStop(0.45,'rgba(80,38,10,0.90)');
  mnd.addColorStop(1,'rgba(50,20,4,0)');
  ctx.fillStyle=mnd;
  ctx.beginPath(); ctx.ellipse(cx,cy+18,56,30,0,0,Math.PI*2); ctx.fill();
  // Surface clumps
  ctx.fillStyle='rgba(95,48,14,0.82)';
  for(let i=0;i<9;i++){
    ctx.beginPath();
    ctx.ellipse(cx+rand(-38,38),cy+rand(-8,24),rand(4,9),rand(3,5),rand(-0.5,0.5),0,Math.PI*2);
    ctx.fill();
  }
  // Highlight ridge
  ctx.fillStyle='rgba(150,88,30,0.35)';
  ctx.beginPath(); ctx.ellipse(cx-6,cy+6,26,9,-0.2,0,Math.PI*2); ctx.fill();
}

// ── Trailer — agados, overlaid on photo road ──────────────────────────────────
function drawTrailer(){
  const tx = TRUCK_ZONE.x + TRUCK_ZONE.w*0.46;
  const ty = TRUCK_ZONE.y + TRUCK_ZONE.h*0.52;
  const tw = 148, th = 52;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(tx,ty+th*0.54,tw*0.52,8,0,0,Math.PI*2); ctx.fill();
  // Main body
  ctx.fillStyle='rgba(130,138,142,0.94)';
  ctx.beginPath(); ctx.roundRect(tx-tw/2,ty-th/2,tw,th,5); ctx.fill();
  // Aluminium plank stripes
  for(let i=0;i<7;i++){
    const pg=ctx.createLinearGradient(tx-tw/2,0,tx+tw/2,0);
    pg.addColorStop(0,'rgba(148,158,163,0.9)');
    pg.addColorStop(0.42,'rgba(205,215,220,0.9)');
    pg.addColorStop(0.75,'rgba(158,168,173,0.9)');
    pg.addColorStop(1,'rgba(128,136,140,0.9)');
    ctx.fillStyle=pg;
    ctx.fillRect(tx-tw/2+3, ty-th/2+3+i*7, tw-6, 5);
  }
  // Side walls (darker edges)
  ctx.fillStyle='rgba(80,88,92,0.88)';
  ctx.fillRect(tx-tw/2,ty-th/2,5,th);
  ctx.fillRect(tx+tw/2-5,ty-th/2,5,th);
  // Rear lights
  ctx.fillStyle='rgba(255,30,30,0.92)';
  ctx.beginPath(); ctx.roundRect(tx-tw/2-7,ty-12,7,10,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(tx+tw/2,ty-12,7,10,2); ctx.fill();
  ctx.fillStyle='rgba(255,120,120,0.6)';
  ctx.beginPath(); ctx.roundRect(tx-tw/2-7,ty-12,7,10,2); ctx.fill();
  // AGADOS label
  ctx.fillStyle='#ffe030'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
  ctx.fillText('agados', tx-8, ty-8);
  // 100 km/h circle sticker
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(tx+44, ty-10, 9, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(tx+44, ty-10, 9, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle='#111'; ctx.font='bold 7px Arial';
  ctx.fillText('100', tx+44, ty-6);
  // Licence plate
  ctx.fillStyle='rgba(240,240,224,0.96)';
  ctx.beginPath(); ctx.roundRect(tx-17,ty+th/2-14,34,12,2); ctx.fill();
  ctx.fillStyle='#111'; ctx.font='bold 6px Arial';
  ctx.fillText('3M7 9681', tx, ty+th/2-5);
  // Tow bar
  ctx.strokeStyle='rgba(80,80,80,0.9)'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(tx-tw/2,ty+6); ctx.lineTo(tx-tw/2-22,ty+6); ctx.stroke();
  ctx.lineCap='butt';
  // Wheels
  for(const wx of [tx-46, tx+42]){
    ctx.fillStyle='rgba(18,18,18,0.9)'; ctx.beginPath(); ctx.arc(wx,ty+th/2+4,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(70,70,70,0.85)'; ctx.beginPath(); ctx.arc(wx,ty+th/2+4,9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(110,110,110,0.8)'; ctx.lineWidth=1.5;
    for(let a=0;a<5;a++){
      const ang=a*Math.PI*2/5;
      ctx.beginPath();
      ctx.moveTo(wx,ty+th/2+4);
      ctx.lineTo(wx+Math.cos(ang)*8,ty+th/2+4+Math.sin(ang)*8);
      ctx.stroke();
    }
    ctx.fillStyle='rgba(50,50,50,0.9)'; ctx.beginPath(); ctx.arc(wx,ty+th/2+4,3,0,Math.PI*2); ctx.fill();
  }
  // Dirt fill when carrying progress
  if(load>0){
    const fillH=Math.min(th-8,load/10*(th-8));
    ctx.fillStyle='rgba(75,38,10,0.88)';
    ctx.beginPath();
    ctx.roundRect(tx-tw/2+4, ty-th/2+3+(th-8-fillH), tw-8, fillH, 3);
    ctx.fill();
  }
}

function drawZoneIndicators(){
  if(state!=='play') return;
  // Dirt zone — subtle pulsing highlight
  if(!carrying){
    ctx.strokeStyle='rgba(160,100,40,.5)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(DIRT_ZONE.x,DIRT_ZONE.y,DIRT_ZONE.w,DIRT_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
  // Truck zone
  if(carrying){
    ctx.strokeStyle='rgba(80,180,80,.6)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(TRUCK_ZONE.x,TRUCK_ZONE.y,TRUCK_ZONE.w,TRUCK_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

// ── Smoke puffs ───────────────────────────────────────────────────────────────
function drawSmokeParticles(){
  for(const p of puff){
    ctx.globalAlpha=p.a;
    ctx.fillStyle='rgba(200,200,200,1)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Player drawing ─────────────────────────────────────────────────────────────
function drawPlayer(){
  const px=player.x, py=player.y;
  const f=player.facing;
  const t=animFrame;

  // Determine state
  const moving = Math.abs(joy.dx)>0.1||Math.abs(joy.dy)>0.1||
                 keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||
                 keys['a']||keys['A']||keys['d']||keys['D']||keys['w']||keys['W']||keys['s']||keys['S'];

  let st='idle';
  if(smokePause) st='smoke';
  else if(moving && carrying) st='carry';
  else if(moving) st='walk';
  else if(carrying) st='carry';

  ctx.save();
  ctx.translate(px, py);
  if(f<0) ctx.scale(-1,1);

  // Bob / walk offsets
  const bob = st==='idle' ? Math.sin(t*0.6)*1.5 : 0;
  const legL = (st==='walk'||st==='carry') ? Math.sin(t*0.9)*8 : 0;
  const legR = -legL;
  const tilt = st==='dig' ? Math.sin(t)*6*(Math.PI/180) : 0;

  ctx.translate(0, bob);
  ctx.rotate(tilt);

  // Legs
  ctx.fillStyle='#b8bcb8';
  // Left leg
  ctx.save();
  ctx.translate(-7, 22);
  ctx.rotate(legL*(Math.PI/180));
  ctx.beginPath(); ctx.roundRect(-5,0,10,24,4); ctx.fill();
  ctx.fillStyle='#888'; ctx.fillRect(-5,22,10,5);
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(7,22);
  ctx.rotate(legR*(Math.PI/180));
  ctx.fillStyle='#b8bcb8';
  ctx.beginPath(); ctx.roundRect(-5,0,10,24,4); ctx.fill();
  ctx.fillStyle='#888'; ctx.fillRect(-5,22,10,5);
  ctx.restore();

  // Body (lime green hoodie)
  const torsoG=ctx.createLinearGradient(-13,-20,13,-20);
  torsoG.addColorStop(0,'#7a9a30');
  torsoG.addColorStop(0.3,'#9eb848');
  torsoG.addColorStop(0.7,'#8aaa38');
  torsoG.addColorStop(1,'#6a8828');
  ctx.fillStyle=torsoG;
  ctx.beginPath(); ctx.roundRect(-13,-22,26,44,6); ctx.fill();
  // Hood
  ctx.fillStyle='#8aaa38';
  ctx.beginPath(); ctx.ellipse(0,-22,11,7,0,0,Math.PI*2); ctx.fill();
  // Center seam
  ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,18); ctx.stroke();
  // Kangaroo pocket
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.beginPath(); ctx.roundRect(-9,5,18,10,4); ctx.fill();

  // Head & face
  const skinG=ctx.createRadialGradient(2,-34,2,0,-34,12);
  skinG.addColorStop(0,'#d8b888');
  skinG.addColorStop(1,'#c8a878');
  ctx.fillStyle=skinG;
  ctx.beginPath(); ctx.ellipse(0,-34,11,13,0,0,Math.PI*2); ctx.fill();
  // Stubble
  ctx.fillStyle='rgba(70,45,25,.55)';
  ctx.beginPath(); ctx.ellipse(0,-28,7,4,0,0,Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-4,-35,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-35,1.8,0,Math.PI*2); ctx.fill();

  // Cap (flat black)
  ctx.fillStyle='#0e0e0e';
  ctx.beginPath(); ctx.ellipse(0,-45,13,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-13,-48,26,5);
  // Brim
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(6,-50,14,4,2); ctx.fill();

  // Shovel
  if(st!=='smoke' && st!=='caught'){
    drawShovel(st==='carry');
  }

  // Smoke state extras
  if(st==='smoke'){
    // phone at ear
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.roundRect(10,-38,6,14,2); ctx.fill();
    // cigarette
    ctx.strokeStyle='#f0f0e0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(6,-26); ctx.lineTo(16,-24); ctx.stroke();
    ctx.fillStyle='#ff6620'; ctx.beginPath(); ctx.arc(16,-24,2.5,0,Math.PI*2); ctx.fill();
    // 🚬 text
    ctx.font='12px serif'; ctx.textAlign='center';
    ctx.fillText('🚬',0,-58);
  }

  // Caught state
  if(st==='caught'){
    ctx.font='16px serif'; ctx.textAlign='center';
    ctx.fillText('❗',0,-62);
  }

  ctx.restore();
}

function drawShovel(hasDirt){
  // Handle (wooden)
  const handleG=ctx.createLinearGradient(8,0,14,0);
  handleG.addColorStop(0,'#a06820');
  handleG.addColorStop(0.5,'#c88030');
  handleG.addColorStop(1,'#906010');
  ctx.strokeStyle=handleG; ctx.lineWidth=4;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(6,-10);
  ctx.lineTo(16,24);
  ctx.stroke();
  ctx.lineCap='butt';
  // Blade (metal)
  const bladeG=ctx.createLinearGradient(10,24,22,32);
  bladeG.addColorStop(0,'#d0d0d8');
  bladeG.addColorStop(0.5,'#f0f0f8');
  bladeG.addColorStop(1,'#a8a8b0');
  ctx.fillStyle=bladeG;
  ctx.beginPath();
  ctx.moveTo(14,22);
  ctx.lineTo(22,28);
  ctx.lineTo(18,36);
  ctx.lineTo(10,30);
  ctx.closePath();
  ctx.fill();
  // Dirt on blade
  if(hasDirt){
    ctx.fillStyle='rgba(80,35,10,.85)';
    ctx.beginPath();
    ctx.ellipse(16,30,6,4,0.4,0,Math.PI*2);
    ctx.fill();
  }
}

// ── Photographer ───────────────────────────────────────────────────────────────
function drawPhotographer(){
  const px=photoX, py=photoY;
  ctx.save();
  ctx.translate(px,py);
  // Face toward player
  const fx = player.x > photoX ? 1 : -1;
  if(fx<0) ctx.scale(-1,1);

  // Legs (jeans)
  ctx.fillStyle='#2a3a5a';
  ctx.beginPath(); ctx.roundRect(-8,18,8,26,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,18,8,26,4); ctx.fill();
  // Jacket (dark)
  ctx.fillStyle='#1e2030';
  ctx.beginPath(); ctx.roundRect(-12,-18,24,38,6); ctx.fill();
  // Camera strap
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-10,-15); ctx.lineTo(10,-15); ctx.stroke();
  // Camera body raised
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.roundRect(-4,-30,20,14,3); ctx.fill();
  // Lens
  const lensG=ctx.createRadialGradient(6,-22,1,6,-22,7);
  lensG.addColorStop(0,'rgba(180,220,255,.9)');
  lensG.addColorStop(0.5,'rgba(80,120,200,.5)');
  lensG.addColorStop(1,'#111');
  ctx.fillStyle=lensG;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.stroke();
  // Head (above camera)
  const skinG=ctx.createRadialGradient(2,-44,2,0,-44,10);
  skinG.addColorStop(0,'#d0a878'); skinG.addColorStop(1,'#b89060');
  ctx.fillStyle=skinG;
  ctx.beginPath(); ctx.ellipse(0,-43,9,11,0,0,Math.PI*2); ctx.fill();
  // Beanie
  ctx.fillStyle='#2a1a0e';
  ctx.beginPath(); ctx.ellipse(0,-51,11,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-11,-54,22,5);
  // Badge
  ctx.fillStyle='#e0001e';
  ctx.beginPath(); ctx.roundRect(-22,-68,44,14,4); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('FOTOGRAF!',0,-58);

  ctx.restore();
}

function drawDetectionLine(){
  // Red dashed line from photographer to player
  ctx.save();
  ctx.strokeStyle='rgba(220,0,30,.7)';
  ctx.lineWidth=1.5; ctx.setLineDash([8,5]);
  ctx.beginPath();
  ctx.moveTo(photoX, photoY-20);
  ctx.lineTo(player.x, player.y-20);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  if(state==='play') update(dt);
  render();
}

// ── UI buttons ────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-win').style.display='none';
  document.getElementById('ov-lose').style.display='none';
  state='play';
  initGame();
}

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-win').addEventListener('click',startGame);
document.getElementById('btn-lose').addEventListener('click',startGame);

requestAnimationFrame(loop);
</script>
