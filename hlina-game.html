<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hlína do Vlečky</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto}
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:clamp(6px,2vw,14px) clamp(10px,3vw,20px);
  pointer-events:none;
  font-family:'Segoe UI',Arial,sans-serif;
  color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
#hud-left{display:flex;flex-direction:column;gap:6px}
#timer-box{
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:4px 12px;
  font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:.05em;
  min-width:100px;text-align:center;
}
#progress-label{font-size:clamp(.65rem,2vw,.85rem);opacity:.8;margin-bottom:2px}
#progress-track{
  width:clamp(120px,28vw,200px);height:16px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;
}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#d4923a,#e8b84a);border-radius:8px;transition:width .25s}
#smoke-indicator{
  font-size:clamp(.8rem,2.5vw,1.1rem);
  background:rgba(0,0,0,.6);border:1px solid rgba(255,200,0,.4);
  border-radius:8px;padding:3px 10px;
  display:none;
}
#joystick-wrap{
  position:absolute;bottom:clamp(20px,5vw,40px);left:clamp(20px,5vw,40px);
  display:none;pointer-events:auto;
}
#joystick-base{
  width:clamp(80px,18vw,110px);height:clamp(80px,18vw,110px);
  border-radius:50%;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);
  position:relative;touch-action:none;
}
#joystick-knob{
  position:absolute;width:38%;height:38%;
  background:radial-gradient(circle at 35% 35%,#ffe066,#c8a000);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
/* Overlays */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);
  font-family:'Segoe UI',Arial,sans-serif;color:#fff;
  gap:14px;padding:24px;text-align:center;
  backdrop-filter:blur(4px);
}
.overlay h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:800;letter-spacing:.04em;color:#ffe066;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.overlay p{font-size:clamp(.85rem,2.5vw,1.1rem);opacity:.9;max-width:440px;line-height:1.6}
.btn{
  margin-top:8px;padding:12px 36px;
  background:linear-gradient(135deg,#d4923a,#b87020);
  border:none;border-radius:8px;color:#fff;
  font-size:clamp(1rem,3vw,1.2rem);font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .1s,box-shadow .1s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.btn:active{transform:translateY(0)}
#flash-overlay{
  position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  transition:opacity .05s;
}
#toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(40,40,40,.92);color:#ffe066;
  border:1px solid rgba(255,200,0,.4);border-radius:8px;
  padding:8px 20px;font-family:'Segoe UI',Arial,sans-serif;
  font-size:clamp(.85rem,2.5vw,1rem);font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="hud-left">
      <div id="timer-box">0:00.0</div>
      <div>
        <div id="progress-label">Vlečka: 0 / 10</div>
        <div id="progress-track"><div id="progress-bar"></div></div>
      </div>
    </div>
    <div id="smoke-indicator">🚬 Přestávka…</div>
  </div>
  <div id="joystick-wrap"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  <div id="flash-overlay"></div>
  <div id="toast"></div>

  <!-- START -->
  <div class="overlay" id="ov-start">
    <h1>⛏ Hlína do Vlečky</h1>
    <p>Naplň vlečku 10× lopatou hlíny. Pohyb: <b>WASD / šipky</b> nebo joystick.<br>Dávej pozor na fotografa! A na cigaretové přestávky…</p>
    <button class="btn" id="btn-start">Hrát!</button>
  </div>
  <!-- WIN -->
  <div class="overlay" id="ov-win" style="display:none">
    <h1>🏆 Výhra!</h1>
    <p id="win-msg">Vlečka plná! Čas: <b id="win-time">—</b></p>
    <button class="btn" id="btn-win">Znovu</button>
  </div>
  <!-- LOSE -->
  <div class="overlay" id="ov-lose" style="display:none">
    <h1>📷 Chycen!</h1>
    <p>Fotograf tě přistihl s lopatou hlíny!<br>Čas: <b id="lose-time">—</b></p>
    <button class="btn" id="btn-lose">Zkusit znovu</button>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const W = 720, H = 500;

// Zone definitions (logical coords)
const DIRT_ZONE  = {x:60,  y:280, w:110, h:80};
const TRUCK_ZONE = {x:540, y:300, w:130, h:80};

// Player config
const PLAYER_SPEED = 2.8;
const PLAYER_W = 32, PLAYER_H = 52;

// Obstacle timings (seconds)
const PHOTO_FIRST_MIN = 20, PHOTO_FIRST_MAX = 35;
const PHOTO_GAP_MIN   = 25, PHOTO_GAP_MAX   = 45;
const PHOTO_VIS_MIN   = 6,  PHOTO_VIS_MAX   = 10;
const PHOTO_DETECT_DIST = 200;

const SMOKE_GAP_MIN = 12, SMOKE_GAP_MAX = 18;
const SMOKE_DUR = 3;

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let SCALE=1, OX=0, OY=0, DPR=1;

function resize(){
  DPR   = window.devicePixelRatio || 1;
  const vw = window.innerWidth, vh = window.innerHeight;
  SCALE = Math.min(vw/W, vh/H);
  OX    = (vw - W*SCALE)/2;
  OY    = (vh - H*SCALE)/2;
  canvas.width  = vw*DPR;
  canvas.height = vh*DPR;
  canvas.style.width  = vw+'px';
  canvas.style.height = vh+'px';
}
window.addEventListener('resize', resize);
resize();

function logicalToCanvas(lx,ly){
  return [(OX+lx*SCALE)*DPR, (OY+ly*SCALE)*DPR];
}

// ── State ────────────────────────────────────────────────────────────────────
let state='start'; // start|play|win|lose
let keys={};
let joy={dx:0,dy:0};

let player, load, carrying;
let elapsedMs, timerInterval;
let photoTimer, photoVisible, photoX, photoY, photoVisTimer;
let smokeTimer, smokePause, smokePauseTimer;
let animFrame=0, animTick=0;
let puff=[];  // smoke puffs [{x,y,r,a,vx,vy}]
let flashTimer=0;

function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}

function initGame(){
  player = {x:180, y:310, vx:0, vy:0, facing:1};
  load=0; carrying=false;
  elapsedMs=0;
  animFrame=0; animTick=0;
  puff=[];
  flashTimer=0;
  photoVisible=false;
  photoTimer = rand(PHOTO_FIRST_MIN, PHOTO_FIRST_MAX);
  smokeTimer = rand(SMOKE_GAP_MIN, SMOKE_GAP_MAX);
  smokePause=false; smokePauseTimer=0;

  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-label').textContent='Vlečka: 0 / 10';
  document.getElementById('timer-box').textContent='0:00.0';
  document.getElementById('smoke-indicator').style.display='none';

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(state==='play' && !smokePause){
      elapsedMs+=100;
      updateTimerDisplay();
    }
  },100);
}

function updateTimerDisplay(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  document.getElementById('timer-box').textContent=
    m+':'+(ss<10?'0':'')+ss+'.'+ds;
}
function fmtTime(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  return m+':'+(ss<10?'0':'')+ss+'.'+ds;
}

// ── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',  e=>{keys[e.key]=false});

// Touch joystick
const jBase = document.getElementById('joystick-base');
const jKnob = document.getElementById('joystick-knob');
let jTouch=null, jCx=0, jCy=0, jR=0;

function setupJoystick(){
  const isTouch = 'ontouchstart' in window;
  if(isTouch) document.getElementById('joystick-wrap').style.display='block';
  jBase.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const r=jBase.getBoundingClientRect();
    jCx=r.left+r.width/2; jCy=r.top+r.height/2; jR=r.width/2;
    jTouch=t.identifier;
    updateJoy(t.clientX, t.clientY);
  },{passive:false});
  jBase.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.touches) if(t.identifier===jTouch) updateJoy(t.clientX,t.clientY);
  },{passive:false});
  jBase.addEventListener('touchend',e=>{
    jTouch=null; joy={dx:0,dy:0};
    jKnob.style.transform='translate(-50%,-50%)';
  },{passive:false});
}
function updateJoy(cx,cy){
  let dx=cx-jCx, dy=cy-jCy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const max=jR*0.38;
  if(dist>max){dx*=max/dist;dy*=max/dist;}
  joy.dx=dx/max; joy.dy=dy/max;
  jKnob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}
setupJoystick();

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.style.opacity='0',2200);
}

// ── Game Logic Update ─────────────────────────────────────────────────────────
function update(dt){
  if(state!=='play') return;

  // Flash
  if(flashTimer>0){
    flashTimer-=dt;
    const fl=document.getElementById('flash-overlay');
    fl.style.opacity=Math.max(0,flashTimer/0.3);
    if(flashTimer<=0) fl.style.opacity=0;
  }

  // Smoke puffs update
  puff=puff.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.r+=8*dt; p.a-=0.6*dt;
    return p.a>0;
  });

  // Smoke pause
  if(smokePause){
    smokePauseTimer-=dt;
    if(smokePauseTimer<=0){
      smokePause=false;
      document.getElementById('smoke-indicator').style.display='none';
    }
    // emit puffs during pause
    if(Math.random()<0.15){
      puff.push({
        x:player.x+(player.facing>0?14:-14),
        y:player.y-30,
        r:4, a:0.7,
        vx:rand(-10,10), vy:rand(-25,-10)
      });
    }
    return; // player frozen
  }

  // Smoke timer
  smokeTimer-=dt;
  if(smokeTimer<=0){
    smokePause=true;
    smokePauseTimer=SMOKE_DUR;
    smokeTimer=rand(SMOKE_GAP_MIN,SMOKE_GAP_MAX);
    document.getElementById('smoke-indicator').style.display='block';
    showToast('🚬 Cigaretová přestávka!');
  }

  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy=1;
  dx+=joy.dx; dy+=joy.dy;
  if(dx!==0||dy!==0){
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len; dy/=len;
    player.x+=dx*PLAYER_SPEED;
    player.y+=dy*PLAYER_SPEED;
    if(dx!==0) player.facing=dx>0?1:-1;
  }
  // Clamp
  player.x=Math.max(20,Math.min(W-20,player.x));
  player.y=Math.max(240,Math.min(H-30,player.y));

  // Animation
  animTick+=dt;
  if(animTick>0.1){ animTick=0; animFrame++; }

  // Zone interactions
  const px=player.x, py=player.y;
  const inDirt = px>DIRT_ZONE.x && px<DIRT_ZONE.x+DIRT_ZONE.w &&
                 py>DIRT_ZONE.y && py<DIRT_ZONE.y+DIRT_ZONE.h;
  const inTruck= px>TRUCK_ZONE.x && px<TRUCK_ZONE.x+TRUCK_ZONE.w &&
                 py>TRUCK_ZONE.y && py<TRUCK_ZONE.y+TRUCK_ZONE.h;

  if(inDirt && !carrying) carrying=true;
  if(inTruck && carrying){
    carrying=false; load++;
    document.getElementById('progress-bar').style.width=(load/10*100)+'%';
    document.getElementById('progress-label').textContent='Vlečka: '+load+' / 10';
    if(load>=10){ endGame('win'); return; }
  }

  // Photographer
  photoTimer-=dt;
  if(photoTimer<=0 && !photoVisible){
    photoVisible=true;
    photoVisTimer=rand(PHOTO_VIS_MIN,PHOTO_VIS_MAX);
    // spawn off-screen edge
    const side=Math.random()<0.5?0:1;
    photoX=side===0?-40:W+40;
    photoY=rand(240,H-60);
  }
  if(photoVisible){
    photoVisTimer-=dt;
    // move toward player
    const pdx=player.x-photoX, pdy=player.y-photoY;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    const spd=55;
    if(pd>1){photoX+=pdx/pd*spd*dt; photoY+=pdy/pd*spd*dt;}

    // detect
    if(carrying && pd<PHOTO_DETECT_DIST){
      endGame('lose'); return;
    }
    if(photoVisTimer<=0){
      photoVisible=false;
      photoTimer=rand(PHOTO_GAP_MIN,PHOTO_GAP_MAX);
    }
  }
}

function endGame(result){
  state=result;
  clearInterval(timerInterval);
  if(result==='win'){
    document.getElementById('win-time').textContent=fmtTime();
    document.getElementById('ov-win').style.display='flex';
  } else {
    flashTimer=0.6;
    document.getElementById('flash-overlay').style.opacity='1';
    document.getElementById('lose-time').textContent=fmtTime();
    setTimeout(()=>{
      document.getElementById('ov-lose').style.display='flex';
    },700);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function render(){
  ctx.save();
  ctx.setTransform(SCALE*DPR,0,0,SCALE*DPR,OX*DPR,OY*DPR);
  ctx.clearRect(0,0,W,H);

  drawScene();
  drawZoneIndicators();
  drawSmokeParticles();

  if(photoVisible) drawPhotographer();
  drawPlayer();

  if(photoVisible && carrying){
    drawDetectionLine();
  }

  ctx.restore();
}

// ── Scene Drawing ─────────────────────────────────────────────────────────────
function drawScene(){
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0,'#c4dce8');
  sky.addColorStop(1,'#d8ead0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.55);

  // Background trees (right upper)
  ctx.fillStyle='#1a3810';
  for(let i=0;i<8;i++){
    ctx.beginPath();
    ctx.ellipse(520+i*22,85+Math.sin(i)*15,28+i*3,38+i*2,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle='#162e0c';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.ellipse(530+i*28,70+Math.cos(i)*10,22,30,0,0,Math.PI*2);
    ctx.fill();
  }

  // Orange building (left)
  // Main façade
  const bldg=ctx.createLinearGradient(0,80,0,220);
  bldg.addColorStop(0,'#d4923a');
  bldg.addColorStop(1,'#c07828');
  ctx.fillStyle=bldg;
  ctx.beginPath(); ctx.roundRect(10,90,200,160,4); ctx.fill();
  // Metal roof
  const roof=ctx.createLinearGradient(0,75,0,95);
  roof.addColorStop(0,'#9a9a9a');
  roof.addColorStop(1,'#717171');
  ctx.fillStyle=roof; ctx.fillRect(5,75,210,20);
  // Drainpipe
  ctx.fillStyle='#888'; ctx.fillRect(195,95,8,155);
  // Door
  ctx.fillStyle='#5c3810';
  ctx.beginPath(); ctx.roundRect(70,160,50,90,3); ctx.fill();
  ctx.fillStyle='#7a4e20';
  ctx.fillRect(75,165,19,38); ctx.fillRect(96,165,19,38);
  ctx.fillRect(75,207,19,38); ctx.fillRect(96,207,19,38);
  // Mailboxes
  ctx.fillStyle='#8b5c20';
  ctx.fillRect(130,175,18,22); ctx.fillRect(152,175,18,22);
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(130,175,18,1); ctx.fillRect(152,175,18,1);
  // Bushes (shaped)
  ctx.fillStyle='#2e6b24';
  ctx.beginPath(); ctx.ellipse(40,250,28,18,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(65,248,22,16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(52,255,20,13,0,0,Math.PI*2); ctx.fill();

  // Background car behind hedge
  ctx.fillStyle='#2a2a2a';
  ctx.beginPath(); ctx.roundRect(390,202,80,30,6); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.roundRect(395,195,70,20,8); ctx.fill();

  // Hedge / living fence (full width)
  const hedgeGrad=ctx.createLinearGradient(0,225,0,265);
  hedgeGrad.addColorStop(0,'#3a8030');
  hedgeGrad.addColorStop(0.5,'#2d6e24');
  hedgeGrad.addColorStop(1,'#1e5018');
  ctx.fillStyle=hedgeGrad;
  for(let i=0;i<18;i++){
    ctx.beginPath();
    ctx.roundRect(i*42-5,222,46,42,8);
    ctx.fill();
  }
  // hedge texture / depth
  ctx.fillStyle='rgba(0,0,0,.12)';
  for(let i=0;i<18;i++){
    ctx.beginPath();
    ctx.ellipse(i*42+14,238,12,8,0.3,0,Math.PI*2);
    ctx.fill();
  }

  // Road
  ctx.fillStyle='#5a5a5a';
  ctx.fillRect(0,265,W,50);
  // Red kerb
  ctx.fillStyle='#c83030';
  ctx.fillRect(0,265,W,6);
  ctx.fillRect(0,309,W,6);
  // Dashed center line
  ctx.strokeStyle='#ffe060'; ctx.lineWidth=2; ctx.setLineDash([20,14]);
  ctx.beginPath(); ctx.moveTo(0,290); ctx.lineTo(W,290); ctx.stroke();
  ctx.setLineDash([]);

  // Ground — dirt area left
  const dirtGnd=ctx.createLinearGradient(0,315,0,H);
  dirtGnd.addColorStop(0,'#2a1408');
  dirtGnd.addColorStop(1,'#3a1c0a');
  ctx.fillStyle=dirtGnd;
  ctx.fillRect(0,315,W*0.55,H-315);

  // Grass right
  const grassGnd=ctx.createLinearGradient(0,315,0,H);
  grassGnd.addColorStop(0,'#2e6020');
  grassGnd.addColorStop(1,'#1e4814');
  ctx.fillStyle=grassGnd;
  ctx.fillRect(W*0.55,315,W*0.45,H-315);

  // Dirt heap (left area)
  drawDirtHeap();

  // VW SUV (rear view, right area)
  drawVWSUV();

  // Trailer (agados)
  drawTrailer();

  // Garden lamp (right)
  drawLamp();

  // Decorative vegetation front
  drawVegetation();
}

function drawDirtHeap(){
  const cx=DIRT_ZONE.x+DIRT_ZONE.w*0.45, cy=DIRT_ZONE.y+DIRT_ZONE.h*0.3;
  // Main mound
  const mnd=ctx.createRadialGradient(cx,cy,5,cx,cy+15,60);
  mnd.addColorStop(0,'#6b3810');
  mnd.addColorStop(0.4,'#4a2208');
  mnd.addColorStop(1,'rgba(42,20,8,0)');
  ctx.fillStyle=mnd;
  ctx.beginPath();
  ctx.ellipse(cx,cy+20,58,32,0,0,Math.PI*2);
  ctx.fill();
  // Clumps
  ctx.fillStyle='#5a2e10';
  for(let i=0;i<8;i++){
    ctx.beginPath();
    ctx.ellipse(
      cx+rand(-40,40), cy+rand(-10,28),
      rand(4,9), rand(3,6),
      rand(-0.5,0.5), 0, Math.PI*2
    );
    ctx.fill();
  }
}

function drawVWSUV(){
  // VW black SUV rear view
  const bx=480, by=340;
  // Body
  const body=ctx.createLinearGradient(bx,by-35,bx,by+30);
  body.addColorStop(0,'#2a2a2e');
  body.addColorStop(0.4,'#1a1a1e');
  body.addColorStop(1,'#111116');
  ctx.fillStyle=body;
  ctx.beginPath(); ctx.roundRect(bx-55,by-35,110,65,10); ctx.fill();
  // Roof
  ctx.fillStyle='#1c1c20';
  ctx.beginPath(); ctx.roundRect(bx-38,by-55,76,24,8); ctx.fill();
  // LED light bar (red)
  const led=ctx.createLinearGradient(bx-52,by-20,bx+52,by-20);
  led.addColorStop(0,'#ff2222');
  led.addColorStop(0.45,'#ff6644');
  led.addColorStop(0.55,'#ff6644');
  led.addColorStop(1,'#ff2222');
  ctx.fillStyle=led;
  ctx.fillRect(bx-50,by-22,100,5);
  ctx.shadowColor='#ff3300'; ctx.shadowBlur=10;
  ctx.fillRect(bx-50,by-22,100,5);
  ctx.shadowBlur=0;
  // Chrome bumper
  ctx.fillStyle='#b0b0b8';
  ctx.beginPath(); ctx.roundRect(bx-50,by+22,100,10,4); ctx.fill();
  // Licence plate
  ctx.fillStyle='#f0f0e0';
  ctx.beginPath(); ctx.roundRect(bx-20,by+6,40,14,2); ctx.fill();
  ctx.fillStyle='#111'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('8H8 8023',bx,by+16);
  // Wheels
  for(const wx of [bx-40,bx+40]){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(wx,by+32,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(wx,by+32,10,0,Math.PI*2); ctx.fill();
    // spokes
    ctx.strokeStyle='#777'; ctx.lineWidth=1.5;
    for(let a=0;a<6;a++){
      const ang=a*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(wx,by+32);
      ctx.lineTo(wx+Math.cos(ang)*9,by+32+Math.sin(ang)*9);
      ctx.stroke();
    }
    ctx.fillStyle='#444'; ctx.beginPath(); ctx.arc(wx,by+32,3,0,Math.PI*2); ctx.fill();
  }
  // Rear window tint
  ctx.fillStyle='rgba(100,150,255,.08)';
  ctx.beginPath(); ctx.roundRect(bx-35,by-53,70,20,6); ctx.fill();
}

function drawTrailer(){
  const tx=540, ty=340;
  // Chassis
  ctx.fillStyle='#888c8e';
  ctx.beginPath(); ctx.roundRect(tx-85,ty-30,160,55,6); ctx.fill();
  // Aluminium planks
  for(let i=0;i<7;i++){
    const pg=ctx.createLinearGradient(tx-85,ty-28+i*7,tx+75,ty-28+i*7);
    pg.addColorStop(0,'#a0a8ac');
    pg.addColorStop(0.4,'#c0c8cc');
    pg.addColorStop(0.7,'#a8b0b4');
    pg.addColorStop(1,'#909898');
    ctx.fillStyle=pg;
    ctx.fillRect(tx-85,ty-28+i*7,160,5);
  }
  // Side walls
  ctx.fillStyle='#6e7678';
  ctx.fillRect(tx-85,ty-30,6,55);
  ctx.fillRect(tx+69,ty-30,6,55);
  // Rear lights
  ctx.fillStyle='#ff2222'; ctx.beginPath(); ctx.roundRect(tx-90,ty-18,8,12,2); ctx.fill();
  ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.roundRect(tx-90,ty-18,8,12,2); ctx.fill();
  ctx.fillStyle='#ff2222'; ctx.beginPath(); ctx.roundRect(tx+74,ty-18,8,12,2); ctx.fill();
  // AGADOS logo
  ctx.fillStyle='#ffe030'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
  ctx.fillText('agados',tx-10,ty-15);
  // 100 km/h sticker
  ctx.fillStyle='#fff'; ctx.font='7px Arial';
  ctx.fillText('100',tx+35,ty-10);
  ctx.strokeStyle='#e00'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(tx+35,ty-14,8,0,Math.PI*2); ctx.stroke();
  // Licence plate
  ctx.fillStyle='#f0f0e0';
  ctx.beginPath(); ctx.roundRect(tx-18,ty+18,36,12,2); ctx.fill();
  ctx.fillStyle='#111'; ctx.font='bold 6px Arial';
  ctx.fillText('3M7 9681',tx-1,ty+27);
  // Tow bar
  ctx.strokeStyle='#555'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(tx-85,ty+20); ctx.lineTo(tx-110,ty+20); ctx.stroke();
  // Wheels
  for(const wx of [tx-55,tx+45]){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(wx,ty+30,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(wx,ty+30,9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#777'; ctx.lineWidth=1.5;
    for(let a=0;a<5;a++){
      const ang=a*Math.PI/2.5;
      ctx.beginPath();
      ctx.moveTo(wx,ty+30);
      ctx.lineTo(wx+Math.cos(ang)*8,ty+30+Math.sin(ang)*8);
      ctx.stroke();
    }
  }
  // If load >0, show dirt in trailer
  if(load>0){
    ctx.fillStyle='rgba(60,25,8,0.85)';
    const fillH=Math.min(40,load/10*42);
    ctx.beginPath();
    ctx.roundRect(tx-79,ty-28+42-fillH,158,fillH,3);
    ctx.fill();
  }
}

function drawLamp(){
  const lx=650, ly=270;
  // Post
  ctx.strokeStyle='#606060'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(lx,ly+80); ctx.lineTo(lx,ly); ctx.stroke();
  // Arm
  ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+20,ly-10); ctx.stroke();
  // Lamp head
  ctx.fillStyle='#808880';
  ctx.beginPath(); ctx.roundRect(lx+14,ly-18,18,14,4); ctx.fill();
  // Glow
  const glow=ctx.createRadialGradient(lx+23,ly-8,2,lx+23,ly-8,40);
  glow.addColorStop(0,'rgba(255,240,140,.4)');
  glow.addColorStop(1,'rgba(255,240,140,0)');
  ctx.fillStyle=glow;
  ctx.fillRect(lx-15,ly-45,80,80);
  // Light bulb
  ctx.fillStyle='#ffe880';
  ctx.beginPath(); ctx.arc(lx+23,ly-11,4,0,Math.PI*2); ctx.fill();
}

function drawVegetation(){
  // Decorative grass tufts (bezier blades)
  ctx.strokeStyle='#3a7828'; ctx.lineWidth=1.5;
  for(let i=0;i<14;i++){
    const gx=W-100+i*8, gy=H-10;
    ctx.beginPath();
    ctx.moveTo(gx,gy);
    ctx.bezierCurveTo(gx-3,gy-10,gx+2,gy-20,gx+rand(-4,4),gy-rand(18,28));
    ctx.stroke();
  }
  // Front green plants
  ctx.fillStyle='#1e5012';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.ellipse(40+i*30, H-8, 18, 12, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle='#2a6a1a';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.ellipse(50+i*30, H-12, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawZoneIndicators(){
  if(state!=='play') return;
  // Dirt zone — subtle pulsing highlight
  if(!carrying){
    ctx.strokeStyle='rgba(160,100,40,.5)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(DIRT_ZONE.x,DIRT_ZONE.y,DIRT_ZONE.w,DIRT_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
  // Truck zone
  if(carrying){
    ctx.strokeStyle='rgba(80,180,80,.6)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(TRUCK_ZONE.x,TRUCK_ZONE.y,TRUCK_ZONE.w,TRUCK_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

// ── Smoke puffs ───────────────────────────────────────────────────────────────
function drawSmokeParticles(){
  for(const p of puff){
    ctx.globalAlpha=p.a;
    ctx.fillStyle='rgba(200,200,200,1)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Player drawing ─────────────────────────────────────────────────────────────
function drawPlayer(){
  const px=player.x, py=player.y;
  const f=player.facing;
  const t=animFrame;

  // Determine state
  const moving = Math.abs(joy.dx)>0.1||Math.abs(joy.dy)>0.1||
                 keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||
                 keys['a']||keys['A']||keys['d']||keys['D']||keys['w']||keys['W']||keys['s']||keys['S'];

  let st='idle';
  if(smokePause) st='smoke';
  else if(moving && carrying) st='carry';
  else if(moving) st='walk';
  else if(carrying) st='carry';

  ctx.save();
  ctx.translate(px, py);
  if(f<0) ctx.scale(-1,1);

  // Bob / walk offsets
  const bob = st==='idle' ? Math.sin(t*0.6)*1.5 : 0;
  const legL = (st==='walk'||st==='carry') ? Math.sin(t*0.9)*8 : 0;
  const legR = -legL;
  const tilt = st==='dig' ? Math.sin(t)*6*(Math.PI/180) : 0;

  ctx.translate(0, bob);
  ctx.rotate(tilt);

  // Legs
  ctx.fillStyle='#b8bcb8';
  // Left leg
  ctx.save();
  ctx.translate(-7, 22);
  ctx.rotate(legL*(Math.PI/180));
  ctx.beginPath(); ctx.roundRect(-5,0,10,24,4); ctx.fill();
  ctx.fillStyle='#888'; ctx.fillRect(-5,22,10,5);
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(7,22);
  ctx.rotate(legR*(Math.PI/180));
  ctx.fillStyle='#b8bcb8';
  ctx.beginPath(); ctx.roundRect(-5,0,10,24,4); ctx.fill();
  ctx.fillStyle='#888'; ctx.fillRect(-5,22,10,5);
  ctx.restore();

  // Body (lime green hoodie)
  const torsoG=ctx.createLinearGradient(-13,-20,13,-20);
  torsoG.addColorStop(0,'#7a9a30');
  torsoG.addColorStop(0.3,'#9eb848');
  torsoG.addColorStop(0.7,'#8aaa38');
  torsoG.addColorStop(1,'#6a8828');
  ctx.fillStyle=torsoG;
  ctx.beginPath(); ctx.roundRect(-13,-22,26,44,6); ctx.fill();
  // Hood
  ctx.fillStyle='#8aaa38';
  ctx.beginPath(); ctx.ellipse(0,-22,11,7,0,0,Math.PI*2); ctx.fill();
  // Center seam
  ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,18); ctx.stroke();
  // Kangaroo pocket
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.beginPath(); ctx.roundRect(-9,5,18,10,4); ctx.fill();

  // Head & face
  const skinG=ctx.createRadialGradient(2,-34,2,0,-34,12);
  skinG.addColorStop(0,'#d8b888');
  skinG.addColorStop(1,'#c8a878');
  ctx.fillStyle=skinG;
  ctx.beginPath(); ctx.ellipse(0,-34,11,13,0,0,Math.PI*2); ctx.fill();
  // Stubble
  ctx.fillStyle='rgba(70,45,25,.55)';
  ctx.beginPath(); ctx.ellipse(0,-28,7,4,0,0,Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-4,-35,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-35,1.8,0,Math.PI*2); ctx.fill();

  // Cap (flat black)
  ctx.fillStyle='#0e0e0e';
  ctx.beginPath(); ctx.ellipse(0,-45,13,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-13,-48,26,5);
  // Brim
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(6,-50,14,4,2); ctx.fill();

  // Shovel
  if(st!=='smoke' && st!=='caught'){
    drawShovel(st==='carry');
  }

  // Smoke state extras
  if(st==='smoke'){
    // phone at ear
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.roundRect(10,-38,6,14,2); ctx.fill();
    // cigarette
    ctx.strokeStyle='#f0f0e0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(6,-26); ctx.lineTo(16,-24); ctx.stroke();
    ctx.fillStyle='#ff6620'; ctx.beginPath(); ctx.arc(16,-24,2.5,0,Math.PI*2); ctx.fill();
    // 🚬 text
    ctx.font='12px serif'; ctx.textAlign='center';
    ctx.fillText('🚬',0,-58);
  }

  // Caught state
  if(st==='caught'){
    ctx.font='16px serif'; ctx.textAlign='center';
    ctx.fillText('❗',0,-62);
  }

  ctx.restore();
}

function drawShovel(hasDirt){
  // Handle (wooden)
  const handleG=ctx.createLinearGradient(8,0,14,0);
  handleG.addColorStop(0,'#a06820');
  handleG.addColorStop(0.5,'#c88030');
  handleG.addColorStop(1,'#906010');
  ctx.strokeStyle=handleG; ctx.lineWidth=4;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(6,-10);
  ctx.lineTo(16,24);
  ctx.stroke();
  ctx.lineCap='butt';
  // Blade (metal)
  const bladeG=ctx.createLinearGradient(10,24,22,32);
  bladeG.addColorStop(0,'#d0d0d8');
  bladeG.addColorStop(0.5,'#f0f0f8');
  bladeG.addColorStop(1,'#a8a8b0');
  ctx.fillStyle=bladeG;
  ctx.beginPath();
  ctx.moveTo(14,22);
  ctx.lineTo(22,28);
  ctx.lineTo(18,36);
  ctx.lineTo(10,30);
  ctx.closePath();
  ctx.fill();
  // Dirt on blade
  if(hasDirt){
    ctx.fillStyle='rgba(80,35,10,.85)';
    ctx.beginPath();
    ctx.ellipse(16,30,6,4,0.4,0,Math.PI*2);
    ctx.fill();
  }
}

// ── Photographer ───────────────────────────────────────────────────────────────
function drawPhotographer(){
  const px=photoX, py=photoY;
  ctx.save();
  ctx.translate(px,py);
  // Face toward player
  const fx = player.x > photoX ? 1 : -1;
  if(fx<0) ctx.scale(-1,1);

  // Legs (jeans)
  ctx.fillStyle='#2a3a5a';
  ctx.beginPath(); ctx.roundRect(-8,18,8,26,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,18,8,26,4); ctx.fill();
  // Jacket (dark)
  ctx.fillStyle='#1e2030';
  ctx.beginPath(); ctx.roundRect(-12,-18,24,38,6); ctx.fill();
  // Camera strap
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-10,-15); ctx.lineTo(10,-15); ctx.stroke();
  // Camera body raised
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.roundRect(-4,-30,20,14,3); ctx.fill();
  // Lens
  const lensG=ctx.createRadialGradient(6,-22,1,6,-22,7);
  lensG.addColorStop(0,'rgba(180,220,255,.9)');
  lensG.addColorStop(0.5,'rgba(80,120,200,.5)');
  lensG.addColorStop(1,'#111');
  ctx.fillStyle=lensG;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.stroke();
  // Head (above camera)
  const skinG=ctx.createRadialGradient(2,-44,2,0,-44,10);
  skinG.addColorStop(0,'#d0a878'); skinG.addColorStop(1,'#b89060');
  ctx.fillStyle=skinG;
  ctx.beginPath(); ctx.ellipse(0,-43,9,11,0,0,Math.PI*2); ctx.fill();
  // Beanie
  ctx.fillStyle='#2a1a0e';
  ctx.beginPath(); ctx.ellipse(0,-51,11,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-11,-54,22,5);
  // Badge
  ctx.fillStyle='#e0001e';
  ctx.beginPath(); ctx.roundRect(-22,-68,44,14,4); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('FOTOGRAF!',0,-58);

  ctx.restore();
}

function drawDetectionLine(){
  // Red dashed line from photographer to player
  ctx.save();
  ctx.strokeStyle='rgba(220,0,30,.7)';
  ctx.lineWidth=1.5; ctx.setLineDash([8,5]);
  ctx.beginPath();
  ctx.moveTo(photoX, photoY-20);
  ctx.lineTo(player.x, player.y-20);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  if(state==='play') update(dt);
  render();
}

// ── UI buttons ────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-win').style.display='none';
  document.getElementById('ov-lose').style.display='none';
  state='play';
  initGame();
}

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-win').addEventListener('click',startGame);
document.getElementById('btn-lose').addEventListener('click',startGame);

requestAnimationFrame(loop);
</script>
