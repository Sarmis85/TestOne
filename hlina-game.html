<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hlína do Vlečky</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100dvh;overflow:hidden;background:#2e5018;touch-action:none}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto}
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:clamp(6px,2vw,14px) clamp(10px,3vw,20px);
  pointer-events:none;
  font-family:'Segoe UI',Arial,sans-serif;
  color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
#hud-left{display:flex;flex-direction:column;gap:6px}
#timer-box{
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:4px 12px;
  font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:.05em;
  min-width:100px;text-align:center;
}
#progress-label{font-size:clamp(.65rem,2vw,.85rem);opacity:.8;margin-bottom:2px}
#progress-track{
  width:clamp(120px,28vw,200px);height:16px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;
}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#d4923a,#e8b84a);border-radius:8px;transition:width .25s}
#smoke-indicator{
  font-size:clamp(.8rem,2.5vw,1.1rem);
  background:rgba(0,0,0,.6);border:1px solid rgba(255,200,0,.4);
  border-radius:8px;padding:3px 10px;
  display:none;
}
#joystick-wrap{
  position:absolute;bottom:clamp(20px,5vw,40px);right:clamp(20px,5vw,40px);
  display:none;pointer-events:auto;
}
#joy-switch{
  position:absolute;bottom:clamp(20px,5vw,40px);left:clamp(20px,5vw,40px);
  width:clamp(40px,10vw,52px);height:clamp(40px,10vw,52px);
  border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);
  color:#fff;font-size:clamp(14px,4vw,20px);font-weight:700;
  display:none;align-items:center;justify-content:center;
  pointer-events:auto;cursor:pointer;touch-action:manipulation;
  user-select:none;
}
#joystick-base{
  width:clamp(80px,18vw,110px);height:clamp(80px,18vw,110px);
  border-radius:50%;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);
  position:relative;touch-action:none;
}
#joystick-knob{
  position:absolute;width:38%;height:38%;
  background:radial-gradient(circle at 35% 35%,#ffe066,#c8a000);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
/* Overlays */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);
  font-family:'Segoe UI',Arial,sans-serif;color:#fff;
  gap:14px;padding:24px;text-align:center;
  backdrop-filter:blur(4px);
}
.overlay h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:800;letter-spacing:.04em;color:#ffe066;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.overlay p{font-size:clamp(.85rem,2.5vw,1.1rem);opacity:.9;max-width:440px;line-height:1.6}
.btn{
  margin-top:8px;padding:12px 36px;
  background:linear-gradient(135deg,#d4923a,#b87020);
  border:none;border-radius:8px;color:#fff;
  font-size:clamp(1rem,3vw,1.2rem);font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .1s,box-shadow .1s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.btn:active{transform:translateY(0)}
#flash-overlay{
  position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  transition:opacity .05s;
}
#toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(40,40,40,.92);color:#ffe066;
  border:1px solid rgba(255,200,0,.4);border-radius:8px;
  padding:8px 20px;font-family:'Segoe UI',Arial,sans-serif;
  font-size:clamp(.85rem,2.5vw,1rem);font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="hud-left">
      <div id="timer-box">0:00.0</div>
      <div>
        <div id="progress-label">Vlečka: 0 / 10</div>
        <div id="progress-track"><div id="progress-bar"></div></div>
      </div>
    </div>
    <div id="smoke-indicator">🚬 Přestávka…</div>
  </div>
  <div id="joystick-wrap"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  <div id="joy-switch">⇄</div>
  <div id="flash-overlay"></div>
  <div id="toast"></div>

  <!-- START -->
  <div class="overlay" id="ov-start">
    <h1>⛏ Hlína do Vlečky</h1>
    <p>Naplň vlečku 10× lopatou hlíny. Pohyb: <b>WASD / šipky</b> nebo joystick.<br>Dávej pozor na fotografa! A na cigaretové přestávky…</p>
    <button class="btn" id="btn-start">Hrát!</button>
  </div>
  <!-- WIN -->
  <div class="overlay" id="ov-win" style="display:none">
    <h1>🏆 Výhra!</h1>
    <p id="win-msg">Vlečka plná! Čas: <b id="win-time">—</b></p>
    <button class="btn" id="btn-win">Znovu</button>
  </div>
  <!-- LOSE -->
  <div class="overlay" id="ov-lose" style="display:none">
    <h1>📷 Chycen!</h1>
    <p>Fotograf tě přistihl s lopatou hlíny!<br>Čas: <b id="lose-time">—</b></p>
    <button class="btn" id="btn-lose">Zkusit znovu</button>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const W = 720, H = 500;
// World is the full photo at canvas height: 1848×850 → 1087×500 (scale 500/850)
// Camera follows player horizontally; canvas shows a 720-wide viewport
const WORLD_W = Math.round(1848 * H / 850);  // 1087

// All zone/object coords are in world space (0–1087 × 0–500)
const DIRT_ZONE  = {x:28,  y:355, w:92,  h:90};
const TRUCK_ZONE = {x:710, y:355, w:110, h:90};

// Background photo (1848×850)
const bgImg = new Image();
bgImg.src = 'media/bg.png';

// Car + trailer photo (1403×1121, white bg → removed via removeWhiteBg)
// Drawn in original orientation: VW on LEFT, trailer on RIGHT
const carImg = new Image();
let carCanvas = null;  // offscreen canvas with alpha (no white)
carImg.onload = () => { carCanvas = removeWhiteBg(carImg, 247); };
carImg.src = 'media/car-trailer.png';

// Dirt heap photo — save the uploaded image as media/dirt-heap.png to activate
const dirtImg = new Image();
let dirtCanvas = null;
dirtImg.onload = () => { dirtCanvas = removeWhiteBg(dirtImg, 240); };
dirtImg.src = 'media/dirt-heap.png';

function removeWhiteBg(img, threshold, softMin=210) {
  const oc = document.createElement('canvas');
  oc.width = img.naturalWidth; oc.height = img.naturalHeight;
  const octx = oc.getContext('2d');
  octx.drawImage(img, 0, 0);
  const id = octx.getImageData(0, 0, oc.width, oc.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    if (r >= threshold && g >= threshold && b >= threshold) {
      d[i+3] = 0;
    } else if (r > softMin && g > softMin && b > softMin) {
      d[i+3] = Math.round((1 - (Math.min(r,g,b) - softMin) / (threshold - softMin)) * 255);
    }
  }
  octx.putImageData(id, 0, 0);
  return oc;
}

// Player config
const PLAYER_SPEED = 2.8;

// Player sprite sheet (1536×1024: 3 cols × 2 rows, each cell 512×512)
// Row 0: idle | walk-1 | walk-2    Row 1: carry | dig | smoke
const playerImg = new Image();
let playerCanvas = null;
playerImg.onload = () => { playerCanvas = removeWhiteBg(playerImg, 185, 155); };
playerImg.src = 'media/player-sprites.png';

// Sprite display constants — cell 512×512 scaled to ~121px on canvas
// Anchor = waist center (body center x≈170, waist y≈288 in source cell)
const SP_CELL = 512;
const SP_SC   = 0.236;
const SP_DISP = Math.round(SP_CELL * SP_SC);    // 121
const SP_WX   = Math.round(170  * SP_SC);        // 40  (body center x in display)
const SP_WY   = Math.round(288  * SP_SC);        // 68  (waist y in display = anchor)
const SP_FRAMES = {
  idle:  [0,0], walk1: [1,0], walk2: [2,0],
  carry: [0,1], dig:   [1,1], smoke: [2,1]
};
const SP_SRC_H = 465;                            // crop label text below sprites
const SP_DSP_H = Math.round(SP_SRC_H * SP_SC);  // ~110

// Obstacle timings (seconds)
const PHOTO_FIRST_MIN = 20, PHOTO_FIRST_MAX = 35;
const PHOTO_GAP_MIN   = 25, PHOTO_GAP_MAX   = 45;
const PHOTO_VIS_MIN   = 6,  PHOTO_VIS_MAX   = 10;
const PHOTO_DETECT_DIST = 200;

const SMOKE_GAP_MIN = 12, SMOKE_GAP_MAX = 18;
const SMOKE_DUR = 3;
const PHONE_DUR_MIN = 9, PHONE_DUR_MAX = 13;
const PHONE_PROB = 0.70;  // 70% phone break, 30% smoke
const PHONE_BUBBLES = ['Čau', 'Na to mám lidi', 'Někdo tady musí přemýšlet', 'to je hlína'];

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let SCALE=1, OX=0, OY=0, DPR=1;
let VIEW_W=W;  // effective viewport width (W…WORLD_W depending on screen)

function resize(){
  DPR   = window.devicePixelRatio || 1;
  const vw = window.innerWidth, vh = window.innerHeight;
  SCALE = Math.min(vw/W, vh/H);
  // Show as much of the world as fits the screen width at current scale
  VIEW_W = Math.min(WORLD_W, Math.floor(vw / SCALE));
  OX    = (vw - VIEW_W*SCALE)/2;
  OY    = (vh - H*SCALE)/2;
  canvas.width  = vw*DPR;
  canvas.height = vh*DPR;
  canvas.style.width  = vw+'px';
  canvas.style.height = vh+'px';
}
window.addEventListener('resize', resize);
resize();

function logicalToCanvas(lx,ly){
  return [(OX+lx*SCALE)*DPR, (OY+ly*SCALE)*DPR];
}

// ── State ────────────────────────────────────────────────────────────────────
let state='start'; // start|play|win|lose
let keys={};
let joy={dx:0,dy:0};

let player, load, carrying;
let camX=0;
let elapsedMs, timerInterval;
let photoTimer, photoVisible, photoX, photoY, photoVisTimer;
let smokeTimer, smokePause, smokePauseTimer;
let phonePause, phonePauseTimer, phoneBubbleIdx, phoneDur;
let animFrame=0, animTick=0;
let puff=[];  // smoke puffs [{x,y,r,a,vx,vy}]
let flashTimer=0;

function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}

function initGame(){
  player = {x:300, y:415, vx:0, vy:0, facing:1};
  camX=0;
  load=0; carrying=false;
  elapsedMs=0;
  animFrame=0; animTick=0;
  puff=[];
  flashTimer=0;
  photoVisible=false;
  photoTimer = rand(PHOTO_FIRST_MIN, PHOTO_FIRST_MAX);
  smokeTimer = rand(SMOKE_GAP_MIN, SMOKE_GAP_MAX);
  smokePause=false; smokePauseTimer=0;
  phonePause=false; phonePauseTimer=0; phoneBubbleIdx=0; phoneDur=10;

  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-label').textContent='Vlečka: 0 / 10';
  document.getElementById('timer-box').textContent='0:00.0';
  document.getElementById('smoke-indicator').style.display='none';

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(state==='play' && !smokePause && !phonePause){
      elapsedMs+=100;
      updateTimerDisplay();
    }
  },100);
}

function updateTimerDisplay(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  document.getElementById('timer-box').textContent=
    m+':'+(ss<10?'0':'')+ss+'.'+ds;
}
function fmtTime(){
  const s = Math.floor(elapsedMs/1000);
  const ds= Math.floor((elapsedMs%1000)/100);
  const m = Math.floor(s/60);
  const ss= s%60;
  return m+':'+(ss<10?'0':'')+ss+'.'+ds;
}

// ── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',  e=>{keys[e.key]=false});

// Touch joystick
const jBase = document.getElementById('joystick-base');
const jKnob = document.getElementById('joystick-knob');
let jTouch=null, jCx=0, jCy=0, jR=0;

function setupJoystick(){
  const isTouch = 'ontouchstart' in window;
  const jWrap   = document.getElementById('joystick-wrap');
  const jSwitch = document.getElementById('joy-switch');
  if(!isTouch) return;

  let joyRight = true;
  function positionJoy(){
    if(joyRight){
      jWrap.style.right='clamp(20px,5vw,40px)'; jWrap.style.left='';
      jSwitch.style.left='clamp(20px,5vw,40px)'; jSwitch.style.right='';
    } else {
      jWrap.style.left='clamp(20px,5vw,40px)'; jWrap.style.right='';
      jSwitch.style.right='clamp(20px,5vw,40px)'; jSwitch.style.left='';
    }
  }
  jWrap.style.display='block';
  jSwitch.style.display='flex';
  positionJoy();
  jSwitch.addEventListener('click',()=>{ joyRight=!joyRight; positionJoy(); });

  jBase.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const r=jBase.getBoundingClientRect();
    jCx=r.left+r.width/2; jCy=r.top+r.height/2; jR=r.width/2;
    jTouch=t.identifier;
    updateJoy(t.clientX, t.clientY);
  },{passive:false});
  jBase.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.touches) if(t.identifier===jTouch) updateJoy(t.clientX,t.clientY);
  },{passive:false});
  jBase.addEventListener('touchend',e=>{
    jTouch=null; joy={dx:0,dy:0};
    jKnob.style.transform='translate(-50%,-50%)';
  },{passive:false});
}
function updateJoy(cx,cy){
  let dx=cx-jCx, dy=cy-jCy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const max=jR*0.38;
  if(dist>max){dx*=max/dist;dy*=max/dist;}
  joy.dx=dx/max; joy.dy=dy/max;
  jKnob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}
setupJoystick();

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.style.opacity='0',2200);
}

// ── Game Logic Update ─────────────────────────────────────────────────────────
function update(dt){
  if(state!=='play') return;

  // Flash
  if(flashTimer>0){
    flashTimer-=dt;
    const fl=document.getElementById('flash-overlay');
    fl.style.opacity=Math.max(0,flashTimer/0.3);
    if(flashTimer<=0) fl.style.opacity=0;
  }

  // Smoke puffs update
  puff=puff.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.r+=8*dt; p.a-=0.6*dt;
    return p.a>0;
  });

  // Smoke pause
  if(smokePause){
    smokePauseTimer-=dt;
    if(smokePauseTimer<=0){
      smokePause=false;
      document.getElementById('smoke-indicator').style.display='none';
    }
    if(Math.random()<0.15){
      puff.push({
        x:player.x+(player.facing>0?30:-30),
        y:player.y-55,
        r:4, a:0.7,
        vx:rand(-10,10), vy:rand(-25,-10)
      });
    }
    return;
  }

  // Phone pause
  if(phonePause){
    phonePauseTimer-=dt;
    const elapsed=phoneDur-phonePauseTimer;
    phoneBubbleIdx=Math.min(PHONE_BUBBLES.length-1,
      Math.floor(elapsed/(phoneDur/PHONE_BUBBLES.length)));
    if(phonePauseTimer<=0){
      phonePause=false;
      document.getElementById('smoke-indicator').style.display='none';
    }
    return;
  }

  // Break timer — 70% phone call, 30% smoke
  smokeTimer-=dt;
  if(smokeTimer<=0){
    smokeTimer=rand(SMOKE_GAP_MIN,SMOKE_GAP_MAX);
    const si=document.getElementById('smoke-indicator');
    if(Math.random()<PHONE_PROB){
      phoneDur=rand(PHONE_DUR_MIN,PHONE_DUR_MAX);
      phonePause=true; phonePauseTimer=phoneDur; phoneBubbleIdx=0;
      si.textContent='📱 Telefonát…'; si.style.display='block';
      showToast('📱 Telefonát!');
    } else {
      smokePause=true; smokePauseTimer=SMOKE_DUR;
      si.textContent='🚬 Přestávka…'; si.style.display='block';
      showToast('🚬 Cigaretová přestávka!');
    }
  }

  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy=1;
  dx+=joy.dx; dy+=joy.dy;
  if(dx!==0||dy!==0){
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len; dy/=len;
    player.x+=dx*PLAYER_SPEED;
    player.y+=dy*PLAYER_SPEED;
    if(dx!==0) player.facing=dx>0?1:-1;
  }
  // Clamp to playable ground (below hedge line, above bottom edge)
  player.x=Math.max(20,Math.min(WORLD_W-20,player.x));
  player.y=Math.max(348,Math.min(H-30,player.y));
  camX=Math.max(0,Math.min(WORLD_W-VIEW_W,player.x-VIEW_W/2));

  // Animation
  animTick+=dt;
  if(animTick>0.1){ animTick=0; animFrame++; }

  // Zone interactions
  const px=player.x, py=player.y;
  const inDirt = px>DIRT_ZONE.x && px<DIRT_ZONE.x+DIRT_ZONE.w &&
                 py>DIRT_ZONE.y && py<DIRT_ZONE.y+DIRT_ZONE.h;
  const inTruck= px>TRUCK_ZONE.x && px<TRUCK_ZONE.x+TRUCK_ZONE.w &&
                 py>TRUCK_ZONE.y && py<TRUCK_ZONE.y+TRUCK_ZONE.h;

  if(inDirt && !carrying) carrying=true;
  if(inTruck && carrying){
    carrying=false; load++;
    document.getElementById('progress-bar').style.width=(load/10*100)+'%';
    document.getElementById('progress-label').textContent='Vlečka: '+load+' / 10';
    if(load>=10){ endGame('win'); return; }
  }

  // Photographer
  photoTimer-=dt;
  if(photoTimer<=0 && !photoVisible){
    photoVisible=true;
    photoVisTimer=rand(PHOTO_VIS_MIN,PHOTO_VIS_MAX);
    // spawn off-screen edge
    const side=Math.random()<0.5?0:1;
    photoX=side===0?camX-40:camX+W+40;
    photoY=rand(355,H-60);
  }
  if(photoVisible){
    photoVisTimer-=dt;
    // move toward player
    const pdx=player.x-photoX, pdy=player.y-photoY;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    const spd=55;
    if(pd>1){photoX+=pdx/pd*spd*dt; photoY+=pdy/pd*spd*dt;}

    // detect
    if(carrying && pd<PHOTO_DETECT_DIST){
      endGame('lose'); return;
    }
    if(photoVisTimer<=0){
      photoVisible=false;
      photoTimer=rand(PHOTO_GAP_MIN,PHOTO_GAP_MAX);
    }
  }
}

function endGame(result){
  state=result;
  clearInterval(timerInterval);
  if(result==='win'){
    document.getElementById('win-time').textContent=fmtTime();
    document.getElementById('ov-win').style.display='flex';
  } else {
    flashTimer=0.6;
    document.getElementById('flash-overlay').style.opacity='1';
    document.getElementById('lose-time').textContent=fmtTime();
    setTimeout(()=>{
      document.getElementById('ov-lose').style.display='flex';
    },700);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function render(){
  // Fill full screen with photo-edge gradient (hides any letterbox bars)
  if(OX>2||OY>2){
    ctx.save();
    ctx.setTransform(DPR,0,0,DPR,0,0);
    const cw=canvas.width/DPR, ch=canvas.height/DPR;
    const g=ctx.createLinearGradient(0,0,0,ch);
    g.addColorStop(0,'#6a8fa8'); g.addColorStop(0.3,'#4a7830'); g.addColorStop(1,'#2a4e18');
    ctx.fillStyle=g; ctx.fillRect(0,0,cw,ch);
    ctx.restore();
  }

  ctx.save();
  ctx.setTransform(SCALE*DPR,0,0,SCALE*DPR,OX*DPR,OY*DPR);
  ctx.clearRect(0,0,VIEW_W,H);

  drawBackground();          // screen space — uses camX + VIEW_W

  ctx.save();
  ctx.translate(-camX, 0);   // world space: all objects in world coords
  drawCarTrailer();
  drawDirtHeap();
  drawZoneIndicators();
  drawSmokeParticles();
  if(photoVisible) drawPhotographer();
  drawPlayer();
  drawPhoneBubbles();
  if(photoVisible && carrying) drawDetectionLine();
  ctx.restore();

  ctx.restore();
}

// ── Background — scrolling photo viewport ─────────────────────────────────────
function drawBackground(){
  if(!bgImg.complete || bgImg.naturalWidth===0){
    ctx.fillStyle='#8aa870'; ctx.fillRect(0,0,VIEW_W,H); return;
  }
  const scaleX = bgImg.naturalWidth / WORLD_W;  // 1848/1087 ≈ 1.700
  ctx.drawImage(bgImg,
    camX  * scaleX, 0,
    VIEW_W * scaleX, bgImg.naturalHeight,
    0, 0, VIEW_W, H
  );
}

// ── Car + trailer — real photo, white bg removed, original orientation ───────
// Image 1403×1121: VW left, trailer right (no flip) — world coords
// Scale 0.13 → 182×146; wheels at world y≈400 (grass foreground)
function drawCarTrailer(){
  if(!carCanvas) return;
  const SC = 0.13;
  const dw = Math.round(carImg.naturalWidth  * SC);  // 182
  const dh = Math.round(carImg.naturalHeight * SC);  // 146
  const dx = 655;  // world x — VW near path, trailer over grass
  const dy = 305;  // lower: wheels at ~dy+128=433

  ctx.drawImage(carCanvas, dx, dy, dw, dh);
}

// ── Dirt heap — overlaid on photo grass ──────────────────────────────────────
// Stable clump offsets — sandy/warm-brown palette matching reference photo
const DIRT_CLUMPS = (()=>{
  const phi=2.39996;
  const clr=[
    'rgba(148,105,52,.82)','rgba(162,118,60,.78)','rgba(132,90,44,.86)',
    'rgba(172,130,68,.72)','rgba(142,100,50,.80)','rgba(155,112,58,.76)',
    'rgba(128,86,42,.88)','rgba(165,122,62,.74)','rgba(138,96,48,.82)',
    'rgba(158,114,58,.77)','rgba(125,84,40,.86)','rgba(168,126,64,.70)'
  ];
  return clr.map((col,i)=>{
    const r=5+Math.sqrt((i+.5)/clr.length)*35, a=i*phi;
    return {x:Math.cos(a)*r*.9, y:Math.sin(a)*r*.52,
      rx:3+Math.abs(Math.sin(i*3.7))*5.5, ry:2+Math.abs(Math.cos(i*2.3))*2.5,
      rot:Math.sin(i*1.9)*.55, col};
  });
})();
function drawDirtHeap(){
  const cx=DIRT_ZONE.x+DIRT_ZONE.w*0.50;
  const cy=DIRT_ZONE.y+DIRT_ZONE.h;   // base of zone
  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath(); ctx.ellipse(cx+2,cy+2,60,10,0,0,Math.PI*2); ctx.fill();
  if(dirtCanvas && dirtCanvas.width>0){
    // Real photo texture (white bg removed)
    const dispW=125;
    const dispH=Math.round(dirtCanvas.height*dispW/dirtCanvas.width);
    ctx.drawImage(dirtCanvas,cx-dispW/2,cy-dispH+8,dispW,dispH);
  } else {
    // Canvas fallback — layered conical mound in sandy tones
    const baseY=cy-4, topY=cy-52;
    const gb=ctx.createRadialGradient(cx,baseY,0,cx,baseY,62);
    gb.addColorStop(0,'rgba(140,98,48,.92)'); gb.addColorStop(.65,'rgba(118,80,36,.70)'); gb.addColorStop(1,'rgba(95,62,25,0)');
    ctx.fillStyle=gb; ctx.beginPath(); ctx.ellipse(cx,baseY,62,22,0,0,Math.PI*2); ctx.fill();
    const gm=ctx.createRadialGradient(cx,topY+22,0,cx,topY+22,44);
    gm.addColorStop(0,'rgba(162,118,62,.95)'); gm.addColorStop(.75,'rgba(128,88,42,.90)'); gm.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gm; ctx.beginPath(); ctx.ellipse(cx,topY+22,44,24,0,0,Math.PI*2); ctx.fill();
    const gu=ctx.createRadialGradient(cx,topY+8,0,cx,topY+8,26);
    gu.addColorStop(0,'rgba(178,138,78,.95)'); gu.addColorStop(.8,'rgba(152,112,58,.88)'); gu.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gu; ctx.beginPath(); ctx.ellipse(cx,topY+8,26,18,0,0,Math.PI*2); ctx.fill();
    const ga=ctx.createRadialGradient(cx,topY,0,cx,topY,12);
    ga.addColorStop(0,'rgba(192,158,92,.90)'); ga.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ga; ctx.beginPath(); ctx.ellipse(cx,topY,12,9,0,0,Math.PI*2); ctx.fill();
    for(const c of DIRT_CLUMPS){
      ctx.fillStyle=c.col;
      ctx.beginPath(); ctx.ellipse(cx+c.x,cy-10+c.y,c.rx,c.ry,c.rot,0,Math.PI*2); ctx.fill();
    }
  }
}


function drawZoneIndicators(){
  if(state!=='play') return;
  // Dirt zone — subtle pulsing highlight
  if(!carrying){
    ctx.strokeStyle='rgba(160,100,40,.5)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(DIRT_ZONE.x,DIRT_ZONE.y,DIRT_ZONE.w,DIRT_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
  // Truck zone
  if(carrying){
    ctx.strokeStyle='rgba(80,180,80,.6)';
    ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.roundRect(TRUCK_ZONE.x,TRUCK_ZONE.y,TRUCK_ZONE.w,TRUCK_ZONE.h,6);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

// ── Smoke puffs ───────────────────────────────────────────────────────────────
function drawSmokeParticles(){
  for(const p of puff){
    ctx.globalAlpha=p.a;
    ctx.fillStyle='rgba(200,200,200,1)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Player drawing — sprite sheet ─────────────────────────────────────────────
function drawPlayer(){
  const px=player.x, py=player.y;
  const f=player.facing;

  const moving=Math.abs(joy.dx)>0.1||Math.abs(joy.dy)>0.1||
    keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||
    keys['a']||keys['A']||keys['d']||keys['D']||keys['w']||keys['W']||keys['s']||keys['S'];

  let fk;
  if(smokePause)      fk='smoke';
  else if(phonePause) fk='carry';   // 'carry' = holding phone
  else if(carrying)   fk='carry';
  else if(moving)   fk=animFrame%8<4?'walk1':'walk2';
  else              fk='idle';

  ctx.save();
  ctx.translate(px,py);
  if(f<0) ctx.scale(-1,1);

  if(playerCanvas){
    const [col,row]=SP_FRAMES[fk];
    ctx.drawImage(playerCanvas,
      col*SP_CELL, row*SP_CELL, SP_CELL, SP_SRC_H,
      -SP_WX, -SP_WY, SP_DISP, SP_DSP_H
    );
  } else {
    // Placeholder while sprite loads
    ctx.fillStyle='#b0c848';
    ctx.beginPath(); ctx.roundRect(-13,-22,26,44,6); ctx.fill();
    ctx.fillStyle='#c4a070';
    ctx.beginPath(); ctx.ellipse(0,-34,11,13,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ── Phone call speech bubbles ─────────────────────────────────────────────────
function drawPhoneBubbles(){
  if(!phonePause) return;
  const idx=Math.min(phoneBubbleIdx,PHONE_BUBBLES.length-1);
  const text=PHONE_BUBBLES[idx];
  const px=player.x, py=player.y;
  ctx.save();
  ctx.font='bold 12px sans-serif';
  ctx.textBaseline='middle'; ctx.textAlign='left';
  const tw=ctx.measureText(text).width;
  const pad=8, bh=26, bw=tw+pad*2;
  let bx=px+20;
  if(bx+bw>WORLD_W-10) bx=px-bw-20;
  bx=Math.max(4,bx);
  const by=py-94;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.beginPath(); ctx.roundRect(bx+2,by+2,bw,bh,9); ctx.fill();
  // Bubble body
  ctx.fillStyle='rgba(255,255,255,.96)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,9); ctx.fill();
  ctx.strokeStyle='rgba(80,80,80,.25)'; ctx.lineWidth=1; ctx.stroke();
  // Tail triangle
  const tx=Math.min(Math.max(px,bx+14),bx+bw-14);
  ctx.fillStyle='rgba(255,255,255,.96)';
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+11); ctx.lineTo(tx+7,by+bh); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(80,80,80,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+11); ctx.lineTo(tx+7,by+bh); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fillRect(tx-6,by+bh-1,12,2);
  // Text
  ctx.fillStyle='#222'; ctx.fillText(text,bx+pad,by+bh/2);
  ctx.restore();
}

// ── Photographer ───────────────────────────────────────────────────────────────
function drawPhotographer(){
  const px=photoX, py=photoY;
  ctx.save();
  ctx.translate(px,py);
  // Face toward player
  const fx = player.x > photoX ? 1 : -1;
  if(fx<0) ctx.scale(-1,1);

  // Legs (jeans)
  ctx.fillStyle='#2a3a5a';
  ctx.beginPath(); ctx.roundRect(-8,18,8,26,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,18,8,26,4); ctx.fill();
  // Jacket (dark)
  ctx.fillStyle='#1e2030';
  ctx.beginPath(); ctx.roundRect(-12,-18,24,38,6); ctx.fill();
  // Camera strap
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-10,-15); ctx.lineTo(10,-15); ctx.stroke();
  // Camera body raised
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.roundRect(-4,-30,20,14,3); ctx.fill();
  // Lens
  const lensG=ctx.createRadialGradient(6,-22,1,6,-22,7);
  lensG.addColorStop(0,'rgba(180,220,255,.9)');
  lensG.addColorStop(0.5,'rgba(80,120,200,.5)');
  lensG.addColorStop(1,'#111');
  ctx.fillStyle=lensG;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(6,-22,7,0,Math.PI*2); ctx.stroke();
  // Head (above camera)
  const skinG=ctx.createRadialGradient(2,-44,2,0,-44,10);
  skinG.addColorStop(0,'#d0a878'); skinG.addColorStop(1,'#b89060');
  ctx.fillStyle=skinG;
  ctx.beginPath(); ctx.ellipse(0,-43,9,11,0,0,Math.PI*2); ctx.fill();
  // Beanie
  ctx.fillStyle='#2a1a0e';
  ctx.beginPath(); ctx.ellipse(0,-51,11,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-11,-54,22,5);
  // Badge
  ctx.fillStyle='#e0001e';
  ctx.beginPath(); ctx.roundRect(-22,-68,44,14,4); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('FOTOGRAF!',0,-58);

  ctx.restore();
}

function drawDetectionLine(){
  // Red dashed line from photographer to player
  ctx.save();
  ctx.strokeStyle='rgba(220,0,30,.7)';
  ctx.lineWidth=1.5; ctx.setLineDash([8,5]);
  ctx.beginPath();
  ctx.moveTo(photoX, photoY-20);
  ctx.lineTo(player.x, player.y-20);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  if(state==='play') update(dt);
  render();
}

// ── UI buttons ────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-win').style.display='none';
  document.getElementById('ov-lose').style.display='none';
  state='play';
  initGame();
}

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-win').addEventListener('click',startGame);
document.getElementById('btn-lose').addEventListener('click',startGame);

requestAnimationFrame(loop);
</script>
