<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro rozvoj Holčovic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

<style>
:root {
  --navy:       #1C3354;
  --navy-deep:  #0F1E32;
  --gold:       #B8873A;
  --gold-light: #D4A85C;
  --white:      #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Navigace ─────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 32px;
  display: flex; align-items: center;
  height: 68px;
}
.nav-logo {
  height: 42px; width: auto; display: block;
  object-fit: contain; mix-blend-mode: screen;
}

/* ── Hero — přes celé okno ────────────────────── */
.hero {
  height: 100vh;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  background-color: var(--navy-deep);
  background-image: url('media/a (9).jpg');
  background-size: cover;
  background-position: center 40%;
}

.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    160deg,
    rgba(10,24,40,.82) 0%,
    rgba(10,24,40,.50) 50%,
    rgba(10,24,40,.70) 100%
  );
}

/* ── Hero obsah ───────────────────────────────── */
.hero-body {
  position: relative; z-index: 2;
  text-align: center;
  padding: 24px;
  max-width: 720px;
  width: 100%;
}

/* ── Animace ──────────────────────────────────── */
@keyframes heroUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes heroFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.hero-eyebrow { animation: heroUp .85s cubic-bezier(.16,1,.3,1) both; animation-delay: .2s; }
.hero h1      { animation: heroUp 1s  cubic-bezier(.16,1,.3,1) both; animation-delay: .4s; }
.hero-divider { animation: heroFade .8s ease both; animation-delay: .65s; }
.hero-msg     { animation: heroUp .8s cubic-bezier(.16,1,.3,1) both; animation-delay: .80s; }
.hero-badge   { animation: heroUp .8s cubic-bezier(.16,1,.3,1) both; animation-delay: 1.0s; }

/* ── Eyebrow řádek ────────────────────────────── */
.hero-eyebrow {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-bottom: 28px;
}
.hero-eyebrow-line { width: 28px; height: 1px; background: var(--gold-light); }
.hero-eyebrow-text {
  font-size: .7rem; letter-spacing: .25em; text-transform: uppercase;
  color: var(--gold-light); font-weight: 500;
}

/* ── Název ────────────────────────────────────── */
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.2rem, 9vw, 6.5rem);
  font-weight: 300; color: var(--white);
  line-height: 1.0; margin-bottom: 0;
  text-shadow: 0 2px 24px rgba(0,0,0,.35);
}
.hero h1 em { font-style: italic; color: var(--gold-light); display: block; }

/* ── Ornamentální oddělovač ───────────────────── */
.hero-divider {
  display: flex; align-items: center; gap: 14px;
  justify-content: center;
  margin: 36px auto;
}
.hero-divider-line { height: 1px; width: 50px; background: rgba(255,255,255,.2); }
.hero-divider-glyph { display: flex; gap: 4px; align-items: center; }
.hero-divider-glyph span { display: block; background: var(--gold); transform: rotate(45deg); }
.hero-divider-glyph span:nth-child(1),
.hero-divider-glyph span:nth-child(3) { width: 5px; height: 5px; opacity: .5; }
.hero-divider-glyph span:nth-child(2) { width: 8px; height: 8px; }

/* ── Zpráva ───────────────────────────────────── */
.hero-msg {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.45rem);
  font-style: italic;
  color: rgba(255,255,255,.82);
  line-height: 1.65;
  margin-bottom: 32px;
  max-width: 560px; margin-left: auto; margin-right: auto;
}

/* ── Badge ────────────────────────────────────── */
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  border: 1px solid rgba(184,135,58,.5);
  border-radius: 3px;
  padding: 10px 22px;
  font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold-light); font-weight: 500;
}
.hero-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .5; transform: scale(1); }
  50%       { opacity: 1;  transform: scale(1.4); }
}
</style>
</head>
<body>


<section class="hero">
  <div class="hero-body">

    <div class="hero-eyebrow">
      <div class="hero-eyebrow-line"></div>
      <span class="hero-eyebrow-text">Holčovice</span>
      <div class="hero-eyebrow-line"></div>
    </div>

    <h1>Pro rozvoj<br><em>Holčovic</em></h1>

    <div class="hero-divider">
      <div class="hero-divider-line"></div>
      <div class="hero-divider-glyph"><span></span><span></span><span></span></div>
      <div class="hero-divider-line"></div>
    </div>

    <p class="hero-msg">
      Připravujeme aktualizovaný obsah webu.<br>
      Brzy se k vám vrátíme s novinkami o naší práci pro obec<br>a plánech dalšího rozvoje Holčovic.
    </p>

    <div class="hero-badge">
      <div class="hero-badge-dot"></div>
      Stránky jsou ve výstavbě
    </div>

  </div>
</section>

</body>
</html>
